function SaveStatus({ status }) {
  const cfg = {
    idle:    { label:"",              color:C.mono   },
    saving:  { label:"● Saving…",    color:C.muted  },
    saved:   { label:"✓ Saved",      color:"#4ADE80"},
    error:   { label:"✕ Save failed",color:"#F87171"},
    loading: { label:"● Loading…",   color:C.muted  },
  }[status] || { label:"", color:C.mono };
  if (!cfg.label) return null;
  return React.createElement("span", {style:{...MONO,fontSize:8,color:cfg.color,letterSpacing:"0.06em",transition:"color .3s"}}, cfg.label);
}

function PercentStat({ label, count, total, col }) {
  const pct = total === 0 ? 0 : Math.round(count / total * 100);
  return React.createElement("div", {style:{display:"flex",flexDirection:"column",gap:4,minWidth:90,padding:"7px 14px",borderRadius:3,background:C.card3,border:`1px solid ${C.border2}`}},
    React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"}},
      React.createElement("span", {style:{...MONO,fontSize:7,color:C.mono,letterSpacing:"0.08em"}}, label),
      React.createElement("span", {style:{...MONO,fontSize:15,color:col,fontWeight:800}}, `${pct}%`)
    ),
    React.createElement("div", {style:{width:"100%",height:3,background:C.border,borderRadius:2,overflow:"hidden"}},
      React.createElement("div", {style:{width:`${pct}%`,height:"100%",borderRadius:2,transition:"width .5s",background:col}})
    ),
    React.createElement("span", {style:{...MONO,fontSize:7,color:C.mono}}, `${count} of ${total} tasks`)
  );
}

function DualProgress({ tasks }) {
  const sabelTasks  = tasks.filter(t => SABEL_OWNERS.has(t.owner));
  const clientTasks = tasks.filter(t => CLIENT_OWNERS.has(t.owner));
  const pct = arr => arr.length === 0 ? 0 : Math.round(arr.filter(t=>t.status==="Complete").length / arr.length * 100);
  const sabelPct  = pct(sabelTasks);
  const clientPct = pct(clientTasks);
  return React.createElement("div", {style:{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}},
    React.createElement("div", {style:{display:"flex",flexDirection:"column",gap:4,minWidth:110,padding:"7px 14px",borderRadius:3,background:C.card3,border:`1px solid ${C.border2}`}},
      React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"}},
        React.createElement("span", {style:{...MONO,fontSize:7,color:"#C084FC",letterSpacing:"0.08em"}}, "SABEL"),
        React.createElement("span", {style:{...MONO,fontSize:15,color:C.w,fontWeight:800}}, `${sabelPct}%`)
      ),
      React.createElement("div", {style:{width:"100%",height:3,background:C.border,borderRadius:2,overflow:"hidden"}},
        React.createElement("div", {style:{width:`${sabelPct}%`,height:"100%",borderRadius:2,transition:"width .5s",background:"linear-gradient(90deg,#C084FC,#818CF8)"}})
      ),
      React.createElement("span", {style:{...MONO,fontSize:7,color:C.mono}}, `${sabelTasks.filter(t=>t.status==="Complete").length}/${sabelTasks.length} tasks`)
    ),

function App() {
  const [phases,     setPhases]     = useState(INIT);
  const [planCol,    setPlanCol]    = useState(new Set());
  const [tlOpen,     setTlOpen]     = useState(true);
  const [tlCol,      setTlCol]      = useState(new Set());
  const [activeO,    setActiveO]    = useState(new Set(["Chris","Richard","Greg","YFood"]));
  const [ed,         setEd]         = useState(null);
  const [edVal,      setEdVal]      = useState("");
  const [saveStatus, setSaveStatus] = useState("loading");
  const saveTimer   = useRef(null);
  const isFirstLoad = useRef(true);

  useEffect(() => {
    fetch(API).then(r=>r.json()).then(({data})=>{ if(data) setPhases(data); setSaveStatus("idle"); }).catch(()=>setSaveStatus("idle"));
  }, []);

  useEffect(() => {
    if (isFirstLoad.current) { isFirstLoad.current=false; return; }
    setSaveStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:phases})})
        .then(r=>r.json()).then(({ok})=>{ setSaveStatus(ok?"saved":"error"); if(ok) setTimeout(()=>setSaveStatus("idle"),2500); })
        .catch(()=>setSaveStatus("error"));
    }, 1200);
  }, [phases]);

  const updTask = useCallback((id,patch)=>setPhases(p=>p.map(ph=>({...ph,tasks:ph.tasks.map(t=>t.id===id?{...t,...patch}:t)}))), []);
  const delTask = useCallback(id=>setPhases(p=>p.map(ph=>({...ph,tasks:ph.tasks.filter(t=>t.id!==id)}))), []);
  const addTask = useCallback(phId=>{
    const id=uid(), today=new Date().toISOString().split("T")[0], end=new Date(Date.now()+5*864e5).toISOString().split("T")[0];
    setPhases(p=>p.map(ph=>ph.id===phId?{...ph,tasks:[...ph.tasks,{id,task:"New task",owner:"Chris",co:"",dep:false,start:today,end,status:"Pending",notes:"",link:""}]}:ph));
    setTimeout(()=>{setEd({id,field:"task"});setEdVal("New task");},30);
  },[]);

  const startEd  = (id,field,val) => { setEd({id,field}); setEdVal(val); };
  const commitEd = (val,close)    => { setEdVal(val); if(close&&ed){updTask(ed.id,{[ed.field]:val});setEd(null);} };
  const cancelEd = ()             => setEd(null);
  const isEd     = (id,field)     => ed?.id===id && ed?.field===field;

  const allT  = useMemo(()=>phases.flatMap(p=>p.tasks),[phases]);
  const stats = useMemo(()=>(({
