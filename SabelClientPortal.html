<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal · Sabel</title>
<style>
  :root{
    --bg:#0B0B0C; --card:#0F1113; --card2:#141618; --card3:#191C20; --card4:#1E2228;
    --w:#FFFFFF; --red:#E10600; --redDim:rgba(225,6,0,0.15); --body:#E2E8F0;
    --muted:#94A3B8; --border:#2A3547; --border2:#1A2232; --mono:#64748B;
    --green:#4ADE80; --blue:#60A5FA; --amber:#FBBF24; --purple:#C084FC; --redText:#F87171;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--body);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'Courier New',Courier,monospace;}
  a{color:var(--blue);text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* faint red centre line, Sabel signature */
  #app{position:relative;min-height:100vh;display:flex;flex-direction:column;}
  #app::before{content:"";position:fixed;top:0;bottom:0;left:50%;width:1px;background:linear-gradient(180deg,transparent,rgba(225,6,0,0.12),transparent);pointer-events:none;z-index:0;}

  header.top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:16px 26px;border-bottom:1px solid var(--border2);background:rgba(11,11,12,0.85);backdrop-filter:blur(6px);}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand img{height:30px;display:block;object-fit:contain;}
  .brand .divline{width:1px;height:26px;background:var(--border);}
  .brand h1{font-size:13px;font-weight:700;letter-spacing:0.14em;color:var(--w);text-transform:uppercase;}
  .brand .sub{font-size:8px;letter-spacing:0.18em;color:var(--mono);text-transform:uppercase;margin-top:2px;}
  .save-status{font-size:8px;letter-spacing:0.06em;transition:color .3s;}

  .layout{position:relative;z-index:1;display:flex;flex:1;min-height:0;}

  /* sidebar */
  aside{width:300px;flex-shrink:0;border-right:1px solid var(--border2);display:flex;flex-direction:column;background:var(--card);}
  .side-head{padding:16px 18px 12px;border-bottom:1px solid var(--border2);}
  .side-head .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .side-head .lbl{font-size:8px;letter-spacing:0.14em;color:var(--mono);text-transform:uppercase;}
  .btn-add{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:3px;background:var(--redDim);
    border:1px solid rgba(225,6,0,0.35);color:#FCA5A5;font-size:10px;font-weight:700;letter-spacing:0.04em;transition:.15s;}
  .btn-add:hover{background:rgba(225,6,0,0.25);color:#fff;}
  .filter-row{display:flex;gap:5px;flex-wrap:wrap;}
  .chip{padding:3px 9px;border-radius:20px;font-size:8px;font-weight:700;letter-spacing:0.05em;border:1px solid var(--border);color:var(--muted);background:transparent;transition:.12s;text-transform:uppercase;}
  .chip.on{background:var(--card4);color:var(--w);border-color:var(--mono);}

  .clients{flex:1;overflow-y:auto;padding:5px;}
  .client{padding:6px 9px;border-radius:4px;border:1px solid transparent;margin-bottom:1px;cursor:pointer;transition:.12s;}
  .client:hover{background:var(--card2);}
  .client.sel{background:var(--card3);border-color:var(--border);}
  .client .cname{font-size:12px;font-weight:600;color:var(--w);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .client .meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
  .stage{font-size:7px;font-weight:800;letter-spacing:0.06em;padding:1px 6px;border-radius:2px;text-transform:uppercase;white-space:nowrap;}
  .client .meta .stage{font-size:6.5px;padding:1px 5px;}
  .pct{font-size:8px;color:var(--mono);font-weight:700;white-space:nowrap;}
  .client .mini-bar{flex:1;margin-top:0;height:3px;}
  .mini-bar{display:flex;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .mini-bar > div{height:100%;transition:width .4s;}
  .empty-side{padding:30px 18px;text-align:center;color:var(--mono);font-size:11px;line-height:1.6;}

  .hide-toggle{display:flex;align-items:center;gap:8px;margin-top:11px;cursor:pointer;user-select:none;}
  .hide-toggle .ht-lbl{font-size:9px;letter-spacing:0.06em;color:var(--muted);text-transform:uppercase;font-weight:600;}
  .switch{position:relative;display:inline-block;width:30px;height:16px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .slider{position:absolute;inset:0;background:var(--card4);border:1px solid var(--border);border-radius:20px;transition:.18s;}
  .switch .slider:before{content:"";position:absolute;width:11px;height:11px;left:2px;top:1.5px;background:var(--mono);border-radius:50%;transition:.18s;}
  .switch input:checked + .slider{background:var(--redDim);border-color:rgba(225,6,0,.4);}
  .switch input:checked + .slider:before{transform:translateX(13px);background:#FCA5A5;}

  /* main */
  main{flex:1;overflow-y:auto;min-width:0;}
  .main-inner{max-width:1180px;margin:0 auto;padding:26px 30px 80px;}
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--mono);text-align:center;gap:10px;}
  .placeholder .big{font-size:15px;color:var(--muted);letter-spacing:0.04em;}

  .client-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px;}
  .client-head .title h2{font-size:24px;font-weight:700;color:var(--w);letter-spacing:-0.01em;}
  .client-head .title .csub{font-size:11px;color:var(--muted);margin-top:4px;}
  .client-head .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .ctrl{display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:4px;background:var(--card2);border:1px solid var(--border2);font-size:10px;}
  .ctrl label{font-size:7px;letter-spacing:0.1em;color:var(--mono);text-transform:uppercase;}
  select.stage-sel{background:var(--card3);border:1px solid var(--border);color:var(--w);font-size:10px;font-weight:700;padding:5px 8px;border-radius:3px;outline:none;}
  .icon-btn{padding:7px 10px;border-radius:4px;background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-size:10px;font-weight:600;transition:.12s;}
  .icon-btn:hover{color:var(--w);border-color:var(--mono);}
  .icon-btn.danger:hover{color:var(--redText);border-color:var(--redText);}

  .tracker-bar{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:12px 15px;border-radius:6px;background:var(--card);border:1px solid var(--border2);}
  .tracker-bar .tlbl{font-size:8px;letter-spacing:0.12em;color:var(--mono);text-transform:uppercase;white-space:nowrap;}
  .tracker-bar input{flex:1;background:var(--card3);border:1px solid var(--border2);border-radius:3px;color:var(--body);font-size:11px;padding:7px 10px;outline:none;}
  .tracker-bar input:focus{border-color:var(--mono);}
  .tracker-bar a.open{padding:7px 13px;border-radius:3px;background:var(--card4);border:1px solid var(--border);color:var(--w);font-size:10px;font-weight:700;white-space:nowrap;}
  .tracker-bar a.open.disabled{opacity:0.35;pointer-events:none;}
  .tracker-sel{background:var(--card3);border:1px solid var(--border2);border-radius:3px;color:var(--body);font-size:11px;font-weight:700;padding:7px 9px;outline:none;cursor:pointer;}
  .tracker-sel:focus{border-color:var(--mono);}
  .gl-pull{margin-top:8px;width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(225,6,0,0.3);border-radius:5px;color:#FCA5A5;font-size:10px;font-weight:700;letter-spacing:0.03em;padding:5px 8px;cursor:pointer;transition:.14s;}
  .gl-pull:hover{border-color:#F87171;color:#fff;}
  .gl-pull:disabled{opacity:.6;cursor:default;}

  .meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .meta-field{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:4px;background:var(--card2);border:1px solid var(--border2);}
  .meta-field label{font-size:7px;letter-spacing:0.1em;color:var(--mono);text-transform:uppercase;}
  .meta-sel{background:var(--card3);border:1px solid var(--border);color:var(--w);font-size:10px;font-weight:700;padding:4px 7px;border-radius:3px;outline:none;}
  .notes-box{margin-bottom:26px;padding:13px 15px;border-radius:6px;background:var(--card);border:1px solid var(--border2);}
  .notes-box label{display:block;font-size:8px;letter-spacing:0.12em;color:var(--mono);text-transform:uppercase;margin-bottom:7px;}
  .notes-edit{font-size:12px;line-height:1.55;color:var(--body);outline:none;min-height:18px;border-radius:3px;}
  .notes-edit:empty:before{content:attr(data-ph);color:var(--border);}
  .notes-edit:focus{box-shadow:0 0 0 1px var(--mono);padding:6px 8px;margin:-6px -8px;background:var(--card2);}

  .overall{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:26px;}
  .stat{flex:1;min-width:150px;padding:13px 16px;border-radius:6px;background:var(--card3);border:1px solid var(--border2);}
  .stat .srow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .stat .sname{font-size:8px;letter-spacing:0.1em;color:var(--mono);text-transform:uppercase;}
  .stat .sval{font-size:18px;font-weight:800;}
  .stat .bar{display:flex;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .stat .bar > div{height:100%;transition:width .5s;}
  .stat .scount{font-size:8px;color:var(--mono);margin-top:7px;}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  @media(max-width:900px){.cols{grid-template-columns:1fr;}}
  .col{background:var(--card);border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
  .col-head{padding:14px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
  .col-head .ch-title{display:flex;align-items:center;gap:9px;}
  .col-head .dot{width:8px;height:8px;border-radius:50%;}
  .col-head h3{font-size:11px;font-weight:700;letter-spacing:0.1em;color:var(--w);text-transform:uppercase;}
  .col-head .cpct{font-size:11px;font-weight:800;}
  .steps{padding:8px;}
  .step{display:flex;align-items:flex-start;gap:12px;padding:10px 11px;border-radius:5px;transition:.1s;position:relative;border-left:2px solid transparent;}
  .step:hover{background:var(--card2);}
  .step.s-pending{border-left-color:rgba(251,191,36,.55);}
  .step.s-done{border-left-color:rgba(74,222,128,.4);}
  /* traffic light */
  .traffic{flex-shrink:0;display:flex;align-items:center;gap:5px;margin-top:2px;padding:3px 5px;border-radius:20px;background:var(--card3);border:1px solid var(--border2);}
  .tl-dot{width:13px;height:13px;border-radius:50%;border:1px solid transparent;opacity:.28;transition:.14s;cursor:pointer;}
  .tl-dot.red{background:#F87171;}
  .tl-dot.amber{background:#FBBF24;}
  .tl-dot.green{background:#4ADE80;}
  .tl-dot:hover{opacity:.7;transform:scale(1.12);}
  .tl-dot.on{opacity:1;}
  .tl-dot.red.on{box-shadow:0 0 7px rgba(248,113,113,.7);}
  .tl-dot.amber.on{box-shadow:0 0 7px rgba(251,191,36,.7);}
  .tl-dot.green.on{box-shadow:0 0 7px rgba(74,222,128,.7);}
  .step-body{flex:1;min-width:0;}
  .step-label{font-size:12.5px;line-height:1.45;color:var(--body);outline:none;border-radius:3px;word-break:break-word;}
  .step.s-done .step-label{color:var(--mono);text-decoration:line-through;text-decoration-color:rgba(148,163,184,0.5);}
  .step-label:focus{background:var(--card4);box-shadow:0 0 0 1px var(--mono);padding:1px 4px;margin:-1px -4px;}
  .step-note{font-size:10px;color:var(--mono);margin-top:4px;outline:none;border-radius:3px;min-height:14px;}
  .step-note:empty:before{content:"+ note";color:var(--border);}
  .step-note:focus{background:var(--card4);box-shadow:0 0 0 1px var(--mono);padding:1px 4px;margin:-1px -4px;color:var(--body);}
  .step-del{flex-shrink:0;opacity:0;color:var(--mono);font-size:15px;line-height:1;padding:2px 4px;border-radius:3px;transition:.12s;}
  .step:hover .step-del{opacity:0.6;}
  .step-del:hover{opacity:1;color:var(--redText);background:var(--card4);}
  .add-step{width:calc(100% - 16px);margin:4px 8px 10px;padding:9px;border-radius:5px;border:1px dashed var(--border);color:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.04em;transition:.12s;text-align:center;}
  .add-step:hover{border-color:var(--mono);color:var(--body);background:var(--card2);}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--card2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:420px;padding:24px;}
  .modal h3{font-size:14px;font-weight:700;color:var(--w);margin-bottom:4px;letter-spacing:0.02em;}
  .modal p{font-size:11px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:8px;letter-spacing:0.1em;color:var(--mono);text-transform:uppercase;margin-bottom:6px;}
  .field input{width:100%;background:var(--card3);border:1px solid var(--border);border-radius:4px;color:var(--body);font-size:13px;padding:9px 11px;outline:none;}
  .field input:focus{border-color:var(--mono);}
  .modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:8px;}
  .btn{padding:9px 16px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.03em;transition:.12s;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn.ghost:hover{color:var(--w);border-color:var(--mono);}
  .btn.primary{background:var(--red);color:#fff;}
  .btn.primary:hover{background:#c10500;}

  .tmpl-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:4px;background:var(--card3);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;letter-spacing:0.04em;transition:.15s;}
  .tmpl-btn:hover{color:var(--w);border-color:var(--mono);background:var(--card4);}

  /* header tabs */
  .tabs{display:flex;gap:4px;background:var(--card3);border:1px solid var(--border2);border-radius:6px;padding:3px;}
  .tab{padding:6px 16px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.03em;color:var(--muted);transition:.14s;}
  .tab:hover{color:var(--w);}
  .tab.on{background:var(--red);color:#fff;}

  /* go-live card */
  .head-right{display:flex;flex-direction:column;align-items:flex-end;gap:11px;}
  .golive-card{min-width:240px;background:linear-gradient(135deg,rgba(225,6,0,0.16),rgba(225,6,0,0.05));border:1px solid rgba(225,6,0,0.45);border-radius:9px;padding:13px 16px;box-shadow:0 0 22px rgba(225,6,0,0.10);}
  .gl-top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:5px;}
  .gl-label{font-size:8px;font-weight:800;letter-spacing:0.14em;color:#FCA5A5;text-transform:uppercase;}
  .gl-days{font-size:10px;font-weight:800;letter-spacing:0.04em;white-space:nowrap;}
  .gl-input{width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(225,6,0,0.3);border-radius:5px;color:var(--w);font-size:18px;font-weight:700;padding:6px 9px;outline:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
  .gl-input:focus{border-color:#F87171;}
  .gl-input::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;}
  .gl-sub{font-size:9px;color:var(--muted);margin-top:5px;letter-spacing:0.02em;}

  /* dashboard */
  .dashboard{position:relative;z-index:1;flex:1;overflow-y:auto;}
  .dash-inner{max-width:1100px;margin:0 auto;padding:28px 30px 80px;}
  .dash-head{margin-bottom:20px;}
  .dash-head h2{font-size:22px;font-weight:700;color:var(--w);letter-spacing:-0.01em;}
  .dash-sub{font-size:11px;color:var(--muted);}
  .dash-table-wrap{border:1px solid var(--border2);border-radius:9px;overflow:hidden;background:var(--card);}
  .dash-table{width:100%;border-collapse:collapse;}
  .dash-table th{text-align:left;font-size:8px;letter-spacing:0.1em;color:var(--mono);text-transform:uppercase;font-weight:700;padding:12px 16px;border-bottom:1px solid var(--border2);background:var(--card2);}
  .dash-table td{padding:11px 16px;border-bottom:1px solid var(--border2);font-size:12px;vertical-align:middle;}
  .dash-table tr:last-child td{border-bottom:none;}
  .dash-table tbody tr:hover{background:var(--card2);}
  .dash-name{font-size:13px;font-weight:600;color:var(--w);text-align:left;}
  .dash-name:hover{color:#FCA5A5;text-decoration:underline;}
  .dash-owner,.dash-date{color:var(--body);}
  .dash-days{font-weight:700;white-space:nowrap;}
  .muted{color:var(--mono);}
  .dash-track{font-size:10px;font-weight:700;color:var(--w);background:var(--card4);border:1px solid var(--border);padding:6px 12px;border-radius:4px;white-space:nowrap;transition:.12s;}
  .dash-track:hover{border-color:var(--mono);background:var(--card3);}
  .dash-track.off{color:var(--mono);background:transparent;border-color:var(--border2);cursor:default;}
  @media(max-width:640px){.golive-card{min-width:0;}.head-right{align-items:stretch;}}

  /* template editor */
  .te-modal{max-width:860px;width:100%;max-height:88vh;display:flex;flex-direction:column;}
  .te-modal .te-scroll{overflow-y:auto;margin:-4px -4px 0;padding:4px;}
  .te-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:760px){.te-cols{grid-template-columns:1fr;}}
  .te-col{background:var(--card);border:1px solid var(--border2);border-radius:7px;overflow:hidden;}
  .te-col-head{padding:11px 15px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:9px;}
  .te-col-head .dot{width:8px;height:8px;border-radius:50%;}
  .te-col-head h4{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--w);text-transform:uppercase;}
  .te-col-head .cnt{font-size:8px;color:var(--mono);margin-left:auto;}
  .te-list{padding:7px;}
  .te-step{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:5px;transition:.1s;}
  .te-step:hover{background:var(--card2);}
  .te-num{flex-shrink:0;width:18px;font-size:9px;color:var(--mono);text-align:right;}
  .te-input{flex:1;background:var(--card3);border:1px solid var(--border2);border-radius:3px;color:var(--body);font-size:12px;padding:6px 9px;outline:none;}
  .te-input:focus{border-color:var(--mono);}
  .te-mv{flex-shrink:0;color:var(--mono);font-size:11px;padding:3px 5px;border-radius:3px;}
  .te-mv:hover{color:var(--w);background:var(--card4);}
  .te-del{flex-shrink:0;color:var(--mono);font-size:15px;line-height:1;padding:2px 6px;border-radius:3px;}
  .te-del:hover{color:var(--redText);background:var(--card4);}
  .te-add{width:calc(100% - 14px);margin:3px 7px 8px;padding:8px;border-radius:5px;border:1px dashed var(--border);color:var(--mono);font-size:10px;font-weight:600;transition:.12s;}
  .te-add:hover{border-color:var(--mono);color:var(--body);background:var(--card2);}
  .te-note{font-size:10px;color:var(--muted);line-height:1.5;margin:14px 2px 4px;padding:10px 13px;background:var(--card3);border:1px solid var(--border2);border-radius:5px;}
  .te-note b{color:var(--body);}

  footer.foot{position:relative;z-index:1;padding:14px 26px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;color:var(--mono);font-size:8px;letter-spacing:0.08em;text-transform:uppercase;}
</style>
</head>
<body>
<div id="app">

  "Yfood Labs": "2026-07-01",      // SOW: Netherlands go-live beginning of July 2026 (approx)

/* ==================== TRACKER LINK + LIVE GO-LIVE ==================== */
const DEFAULT_STAGE = "Onboarding";           // filter shows one stage at a time by default
const BASE = "https://sabel-intercom.github.io/Intake-forms/";
/* Known client trackers (name → webhook key + file). Powers the tracker
   dropdown and pulling the go-live date live from each tracker.
   This built-in list is only a fallback — loadTrackerRegistry() replaces it
   with the live trackers.json registry so new trackers appear automatically. */
let KNOWN_TRACKERS = [
  {name:"Raiz",                key:"raiz-tracker-v1",             file:"RaizTracker_v2.html"},
  {name:"BTS",                 key:"bts-usa-june-tracker-v1",     file:"BTSUSATracker_v2.html"},
  {name:"Donkey Republic",     key:"donkey-republic-tracker-v1",  file:"DonkeyRepublicTracker_v2.html"},
  {name:"FLKItOver",           key:"flkitover-tracker-v1",        file:"FlkitOverTracker_v2.html"},
  {name:"YFood",               key:"yfood-tracker-v1",            file:"YFoodTracker_v2.html"},
  {name:"Cirqul",              key:"cirqul-tracker-v1",           file:"CirqulTracker_v2.html"},
  {name:"Education Perfect",   key:"education-perfect-tracker-v1",file:"EducationPerfectTracker_v2.html"},
  {name:"Huuuge",              key:"huuuge-tracker-v1",           file:"HuuugeTracker_v2.html"},
  {name:"The Giving Movement", key:"thegivingmovement-tracker-v1",file:"TheGivingMovementTracker_v2.html"},
];
const pulledOnce = new Set();                 // clients auto-pulled this session

const SKILL_MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function skillDate(d){
  if(!d) return "";
  const ms=String(d).match(/([A-Z][a-z]{2})\s*(\d{1,2})/g);
  if(!ms) return "";
  const m=ms[ms.length-1].match(/([A-Z][a-z]{2})\s*(\d{1,2})/);
  const mo=SKILL_MONTHS[m[1]]; if(mo==null) return "";
  return "2026-"+String(mo+1).padStart(2,"0")+"-"+String(+m[2]).padStart(2,"0");
}
function extractLiteral(src,startIdx){
  const open=src[startIdx], close=open==="["?"]":"}"; let depth=0,inStr=false;
  for(let i=startIdx;i<src.length;i++){ const ch=src[i];
    if(inStr){ if(ch==="\\"){ i++; continue; } if(ch==="'"){ inStr=false; } continue; }
    if(ch==="'"){ inStr=true; continue; }
    if(ch===open) depth++;
    else if(ch===close){ depth--; if(depth===0) return src.slice(startIdx,i+1); }
  }
  return null;
}
function grabConst(html,name,kind){
  const m=html.indexOf("const "+name+"="); if(m<0) return null;
  const br=html.indexOf(kind,m); if(br<0) return null;
  try{ return Function("return ("+extractLiteral(html,br)+")")(); }catch(e){ return null; }
}
function normalisePhases(data){
  if(!data) return null;
  if(Array.isArray(data)) return data;
  if(Array.isArray(data.phases)) return data.phases;
  if(Array.isArray(data.groups)) return data.groups.map(g=>({tasks:(g.items||[]).map(it=>({task:it.task, end:it.iso||it.date||""}))}));
  return null;
}
function deriveGoLive(phases){
  const gl=[], all=[];
  phases.forEach(ph=>(ph.tasks||[]).forEach(k=>{
    const end=k.end||k.start; if(!end) return; all.push(end);
    if(/go[\s-]?live/i.test(k.task||"")) gl.push(end);
  }));
  if(gl.length) return gl.sort().pop();
  if(all.length) return all.sort().pop();
  return null;
}
function parseSkillPhases(html){
  const P=grabConst(html,"P","["), T=grabConst(html,"T","{");
  if(!P||!T) return null;
  return P.map(ph=>{ const grp=T[ph.id]||{}, tasks=[];
    (grp.sabel||[]).forEach(t=>tasks.push({task:t.t, end:skillDate(t.d)}));
    (grp.client||[]).forEach(t=>tasks.push({task:t.t, end:skillDate(t.d)}));
    return {tasks};
  });
}
/* Replace the built-in list with the live registry (Intake-forms/trackers.json)
   so newly deployed trackers show up in the dropdown with no code change. */
async function loadTrackerRegistry(){
  try{
    const r=await fetch(BASE+"trackers.json",{cache:"no-store"});
    if(r.ok){
      const j=await r.json();
      if(Array.isArray(j) && j.length){
        KNOWN_TRACKERS = j.filter(t=>t && t.file && t.name)
          .map(t=>({name:t.name, key:t.key||"", file:t.file}))
          .sort((a,b)=>a.name.localeCompare(b.name));
      }
    }
  }catch(e){ /* offline — keep the built-in fallback list */ }
}
async function fetchTrackerGoLive(key,file){
  try{
    if(key){
      const r=await fetch(API+"?key="+encodeURIComponent(key));
      if(r.ok){ const j=await r.json(); if(j&&j.ok){ const ph=normalisePhases(j.data); if(ph){ const g=deriveGoLive(ph); if(g) return g; } } }
    }
    if(file){
      const r2=await fetch(BASE+file); if(r2.ok){ const txt=await r2.text(); const ph=parseSkillPhases(txt); if(ph){ const g=deriveGoLive(ph); if(g) return g; } }
    }
  }catch(e){}
  return null;
}
async function pullGoLive(c){
  const btn=document.getElementById("goLivePull");
  if(btn){ btn.disabled=true; btn.textContent="⟳ Pulling…"; }
  const d=await fetchTrackerGoLive(c.trackerKey,c.trackerFile);
  if(d){ c.goLiveDate=d; c.goLiveManual=false; c.goLiveSource="tracker"; scheduleSave(); }
  else { c.goLiveSource="none"; }
  const cur=selected();
  if(cur && cur.id===c.id) render();
  else if(btn){ btn.disabled=false; btn.textContent="⟳ Pull from tracker"; }
}
function goLiveSubText(c){
  if(c.goLiveDate) return (c.goLiveSource==="tracker" ? "From tracker · " : "") + esc(fmtFull(c.goLiveDate));
  if(c.trackerKey||c.trackerFile) return c.goLiveSource==="none" ? "Tracker has no date yet — enter manually" : "Pulling from tracker…";
  return "Not set — add the go-live date";
}

/* ============================ STATE ============================ */
let state = { clients: [], selectedId: null };
let saveTimer = null;
let remoteAvailable = true;
let activeStages = null;  // Set of stages shown; null until prefs load (treated as all)
let view = "portal";      // "portal" | "dashboard"

function shownStages(){ if(!activeStages) activeStages = new Set([DEFAULT_STAGE]); return activeStages; }
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem(PREF_KEY)||"{}");
    const saved = Array.isArray(p.activeStages) ? p.activeStages.filter(s=>STAGE_ORDER.includes(s)) : null;

  }catch(e){ activeStages = new Set([DEFAULT_STAGE]); }
}
function savePrefs(){ try{ localStorage.setItem(PREF_KEY, JSON.stringify({activeStages:[...shownStages()]})); }catch(e){} }

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : "id"+Date.now()+Math.random().toString(16).slice(2));
const mkSteps = arr => arr.map(label => ({ id: uid(), label, status: "todo", note: "" }));

/* The editable standard. New clients are built from state.templates;
   falls back to the constants above on first run / older saves. */
function defaultTemplates(){
  return {
    onboarding:  ONBOARDING_TEMPLATE.map((l,i)=>({ id:"to"+i, label:l })),
    offboarding: OFFBOARDING_TEMPLATE.map((l,i)=>({ id:"tf"+i, label:l })),
  };
}
function tmplSteps(key){
  const t = (state.templates && Array.isArray(state.templates[key])) ? state.templates[key] : null;
  const labels = t ? t.map(s=>s.label) : (key==="onboarding"?ONBOARDING_TEMPLATE:OFFBOARDING_TEMPLATE);
  return mkSteps(labels);
}

function newClient(name, subtitle){
  return {
    id: uid(), name: name.trim(), subtitle: (subtitle||"").trim(),
    stage: "Onboarding", trackerUrl: "", trackerKey: "", trackerFile: "", goLiveManual: false, createdAt: new Date().toISOString(),
    owner: "", type: "", intake: "", notes: "",
    onboarding: tmplSteps("onboarding"),
    offboarding: tmplSteps("offboarding"),
  };
}

/* ============================ PERSISTENCE ============================ */
function setSave(status){
  const el = document.getElementById("saveStatus");
  const map = {
    saving:{t:"● Saving…",c:"var(--muted)"},
    saved:{t:"✓ Saved",c:"var(--green)"},
    error:{t:"✕ Offline — saved to this browser",c:"var(--amber)"},
    loading:{t:"● Loading…",c:"var(--muted)"},
    idle:{t:"",c:"var(--mono)"},
  };
  const cfg = map[status]||map.idle;
  el.textContent = cfg.t; el.style.color = cfg.c;
}

function saveLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
function readLocal(){ try{ return localStorage.getItem(LS_KEY); }catch(e){ return null; } }

function scheduleSave(){
  saveLocal();
  setSave("saving");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushRemote, 1000);
}

async function pushRemote(){
  try{
    const r = await fetch(API_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ data: state }),
    });
    if(!r.ok) throw new Error("bad status");
    remoteAvailable = true;
    setSave("saved");
    setTimeout(()=>setSave("idle"), 1800);
  }catch(e){
    remoteAvailable = false;
    setSave("error");
    document.getElementById("footRight").textContent = "Offline · saved to this browser only";
  }
}

async function loadRemote(){
  setSave("loading");
  try{
    const r = await fetch(API_URL);
    if(!r.ok) throw new Error("bad status");
    const j = await r.json();
    if(j && j.data && Array.isArray(j.data.clients)){
      state = j.data;
      remoteAvailable = true;
      setSave("idle");
      return true;
    }
    setSave("idle");
    return false;
  }catch(e){
    remoteAvailable = false;
    document.getElementById("footRight").textContent = "Offline · saved to this browser only";
    const local = readLocal();
    if(local){ try{ state = JSON.parse(local); }catch(_){} }
    setSave("idle");
    return false;
  }
}

/* ============================ HELPERS ============================ */
function cnt(steps,st){ return steps.filter(s=>s.status===st).length; }
function pct(steps){ if(!steps.length) return 0; return Math.round(cnt(steps,"done")/steps.length*100); }
function pendPct(steps){ if(!steps.length) return 0; return Math.round(cnt(steps,"pending")/steps.length*100); }
function allSteps(c){ return [...c.onboarding, ...c.offboarding]; }
function clientPct(c){ return pct(allSteps(c)); }
function selected(){ return state.clients.find(c=>c.id===state.selectedId) || null; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function daysTo(dateStr){ if(!dateStr) return null; const d=new Date(dateStr+"T00:00:00"); const t=new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/864e5); }
function goLiveLabel(n){ if(n===null) return ""; if(n===0) return "Today"; if(n>0) return `in ${n} day${n===1?"":"s"}`; return `${-n} day${n===-1?"":"s"} ago`; }
function goLiveColour(n){ if(n===null) return "var(--mono)"; if(n<0) return "var(--redText)"; if(n<=7) return "var(--amber)"; return "var(--green)"; }
function fmtFull(dateStr){ if(!dateStr) return ""; return new Date(dateStr+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
function byGoLive(a,b){ const da=a.goLiveDate||"", db=b.goLiveDate||""; if(da&&db) return da.localeCompare(db); if(da) return -1; if(db) return 1; return a.name.localeCompare(b.name); }

/* ============================ RENDER: SIDEBAR ============================ */
function renderFilters(){
  const row = document.getElementById("filterRow");
  const active = shownStages();
  const allOn = STAGE_ORDER.every(s=>active.has(s));
  let html = `<button class="chip ${allOn?'on':''}" data-filter="__all">All ${state.clients.length}</button>`;
  html += STAGE_ORDER.map(s=>{
    const n = state.clients.filter(c=>c.stage===s).length;
    return `<button class="chip ${active.has(s)?'on':''}" data-filter="${s}">${s} ${n}</button>`;
  }).join("");
  row.innerHTML = html;
  row.querySelectorAll(".chip").forEach(b=>b.onclick=(ev)=>{
    const f = b.dataset.filter;
    if(f==="__all"){ activeStages = new Set(STAGE_ORDER); }
    else if(ev.shiftKey){                              // shift-click = add/remove (multi-select)
      const a=shownStages();
      if(a.has(f) && a.size>1) a.delete(f); else a.add(f);
      activeStages=a;
    } else {                                           // plain click = show only this stage
      activeStages = new Set([f]);
    }
    savePrefs(); render();
  });
}

function renderClients(){
  const list = document.getElementById("clientList");
  document.getElementById("clientCount").textContent = `Clients · ${state.clients.length}`;
  const active = shownStages();
  let cs = state.clients
    .filter(c=>active.has(c.stage))
    .sort((a,b)=> a.name.localeCompare(b.name, undefined, {sensitivity:"base"}));

  if(!cs.length){
    list.innerHTML = `<div class="empty-side">${state.clients.length? "No clients match the selected statuses." : "No clients yet.<br>Add your first client to begin."}</div>`;
    return;
  }
  list.innerHTML = cs.map(c=>{
    const st = STAGES[c.stage]; const all=allSteps(c); const p = pct(all); const pp = pendPct(all);
    return `<div class="client ${c.id===state.selectedId?'sel':''}" data-id="${c.id}">
      <div class="cname"><span>${esc(c.name)}</span><span class="pct">${p}%</span></div>
      <div class="meta">
        <span class="stage" style="color:${st.c};background:${st.bg};border:1px solid ${st.bd}">${c.stage}</span>
        <div class="mini-bar"><div style="width:${p}%;background:var(--green)"></div><div style="width:${pp}%;background:var(--amber)"></div></div>
      </div>
    </div>`;
  }).join("");
  list.querySelectorAll(".client").forEach(el=>el.onclick=()=>{ state.selectedId=el.dataset.id; render(); });
}

/* ============================ RENDER: MAIN ============================ */
function statBlock(name, steps, col){
  const total=steps.length, done=cnt(steps,"done"), pend=cnt(steps,"pending"), todo=total-done-pend;
  const p = total?Math.round(done/total*100):0;
  const pp = total?Math.round(pend/total*100):0;
  return `<div class="stat">
    <div class="srow"><span class="sname">${name}</span><span class="sval" style="color:${col}">${p}%</span></div>
    <div class="bar"><div style="width:${p}%;background:var(--green)"></div><div style="width:${pp}%;background:var(--amber)"></div></div>
    <div class="scount"><span style="color:var(--green)">${done} done</span> · <span style="color:var(--amber)">${pend} pending</span> · ${todo} to do</div>
  </div>`;
}

function checklistCol(c, key, title, col){
  const steps = c[key];
  const p = pct(steps);
  const light = (s,st,cls,lbl)=>`<button class="tl-dot ${cls} ${s.status===st?'on':''}" data-set="${s.id}:${st}" title="${lbl}"></button>`;
  const rows = steps.map(s=>`
    <div class="step s-${s.status||'todo'}" data-step="${s.id}">
      <div class="traffic" role="group" aria-label="status">
        ${light(s,"todo","red","Not started")}
        ${light(s,"pending","amber","Pending")}
        ${light(s,"done","green","Complete")}
      </div>
      <div class="step-body">
        <div class="step-label" contenteditable="true" data-label="${s.id}" spellcheck="false">${esc(s.label)}</div>
        <div class="step-note" contenteditable="true" data-note="${s.id}" spellcheck="false">${esc(s.note)}</div>
      </div>
      <button class="step-del" data-del="${s.id}" title="Delete step">×</button>
    </div>`).join("");
  return `<div class="col">
    <div class="col-head">
      <div class="ch-title"><span class="dot" style="background:${col}"></span><h3>${title}</h3></div>
      <span class="cpct" style="color:${col}">${p}%</span>
    </div>
    <div class="steps" data-list="${key}">${rows||'<div class="empty-side" style="padding:18px">No steps. Add one below.</div>'}</div>
    <button class="add-step" data-add="${key}">+ Add step</button>
  </div>`;
}

  const inner = document.getElementById("mainInner");
  const c = selected();
  if(!c){
    inner.innerHTML = `<div class="placeholder">
      <div class="big">Select a client, or add a new one</div>
      <div>Each client gets an onboarding and an offboarding checklist,<br>a tracker link, and live progress your team can see.</div>
    </div>`;
    return;
  }

  inner.innerHTML = `
    <div class="client-head">
      <div class="title">
        <h2>${esc(c.name)}</h2>
        <div class="csub" contenteditable="true" id="subEdit" spellcheck="false">${esc(c.subtitle)||"+ add a subtitle / company"}</div>
      </div>
      <div class="head-right">
        <div class="golive-card">
          <div class="gl-top">
            <span class="gl-label">★ Go-Live date</span>
            <span class="gl-days" style="color:${goLiveColour(daysTo(c.goLiveDate))}">${goLiveLabel(daysTo(c.goLiveDate))}</span>
          </div>
          <input type="date" id="goLiveInput" class="gl-input" value="${esc(c.goLiveDate||"")}">
          <div class="gl-sub" id="goLiveSub">${goLiveSubText(c)}</div>
          ${(c.trackerKey||c.trackerFile) ? `<button class="gl-pull" id="goLivePull" title="Pull the go-live date from the linked tracker">⟳ Pull from tracker</button>` : ``}
        </div>
        <div class="actions">
          <div class="ctrl"><label>Stage</label>
            <select class="stage-sel" id="stageSel">
              ${STAGE_ORDER.map(s=>`<option ${s===c.stage?'selected':''}>${s}</option>`).join("")}
            </select>
          </div>
          <button class="icon-btn" id="renameBtn">Rename</button>
          <button class="icon-btn danger" id="deleteBtn">Delete</button>
        </div>
      </div>
    </div>

    <div class="meta-row">
      <div class="meta-field"><label>Owner</label>
        <select id="ownerSel" class="meta-sel">
          ${["","Richard","Chris","Greg"].map(o=>`<option ${o===(c.owner||"")?'selected':''}>${o||"—"}</option>`).join("")}
        </select>
      </div>
      <div class="meta-field"><label>Type</label>
        <select id="typeSel" class="meta-sel">
          ${["","Project","Migration","Both"].map(o=>`<option ${o===(c.type||"")?'selected':''}>${o||"—"}</option>`).join("")}
        </select>
      </div>
      <div class="meta-field"><label>Intake</label>
        <select id="intakeSel" class="meta-sel">
          ${["","Intercom","Sabel"].map(o=>`<option ${o===(c.intake||"")?'selected':''}>${o||"—"}</option>`).join("")}
        </select>
      </div>
    </div>

    <div class="tracker-bar">
      <span class="tlbl">Project tracker</span>
      <select id="trackerSel" class="tracker-sel">
        <option value="">— Link a tracker —</option>
        ${KNOWN_TRACKERS.map(t=>`<option value="${t.file}" ${c.trackerFile===t.file?'selected':''}>${esc(t.name)}</option>`).join("")}
        <option value="__custom" ${(c.trackerUrl && !c.trackerFile)?'selected':''}>Custom URL…</option>
      </select>
      <input type="url" id="trackerInput" placeholder="…or paste a URL" value="${esc(c.trackerUrl)}">
      <a class="open ${c.trackerUrl?'':'disabled'}" id="trackerOpen" target="_blank" rel="noopener" href="${esc(c.trackerUrl)||'#'}">Open ↗</a>
    </div>

    <div class="notes-box">
      <label>Notes</label>
      <div class="notes-edit" contenteditable="true" id="notesEdit" spellcheck="false" data-ph="Add notes (carried over from the master record)…">${esc(c.notes)}</div>
    </div>

    <div class="overall">
      ${statBlock("Overall progress", allSteps(c), "#fff")}
      ${statBlock("Onboarding", c.onboarding, "#60A5FA")}
      ${statBlock("Offboarding", c.offboarding, "#FBBF24")}
    </div>

    <div class="cols">
      ${checklistCol(c, "onboarding", "Onboarding", "#60A5FA")}
      ${checklistCol(c, "offboarding", "Offboarding", "#FBBF24")}
    </div>`;

  wireMain(c);
}

/* ============================ EVENT WIRING ============================ */
function wireMain(c){
  document.getElementById("stageSel").onchange = e=>{ c.stage=e.target.value; scheduleSave(); render(); };
  document.getElementById("goLiveInput").onchange = e=>{ c.goLiveDate=e.target.value; c.goLiveManual=true; c.goLiveSource="manual"; scheduleSave(); render(); };

  document.getElementById("deleteBtn").onclick = ()=>{
    openModal({
      title:"Delete client?",
      body:`This removes “${esc(c.name)}” and both checklists. This cannot be undone.`,
      okLabel:"Delete", danger:true,
      onOk:()=>{ state.clients=state.clients.filter(x=>x.id!==c.id); state.selectedId=null; scheduleSave(); render(); }
    });
  };
  document.getElementById("renameBtn").onclick = ()=>{
    openModal({
      title:"Rename client", fields:[{key:"name",label:"Client name",value:c.name},{key:"subtitle",label:"Subtitle / company (optional)",value:c.subtitle}],
      okLabel:"Save",
      onOk:(v)=>{ if(v.name.trim()){ c.name=v.name.trim(); c.subtitle=v.subtitle.trim(); scheduleSave(); render(); } }
    });
  };

  const sub = document.getElementById("subEdit");
  sub.onfocus = ()=>{ if(!c.subtitle) sub.textContent=""; };
  sub.onblur = ()=>{ const t=sub.textContent.trim(); c.subtitle=t; if(!t) sub.textContent="+ add a subtitle / company"; scheduleSave(); };

  const norm = v => v==="—" ? "" : v;
  document.getElementById("ownerSel").onchange  = e=>{ c.owner=norm(e.target.value); scheduleSave(); };
  document.getElementById("typeSel").onchange   = e=>{ c.type=norm(e.target.value); scheduleSave(); };
  document.getElementById("intakeSel").onchange = e=>{ c.intake=norm(e.target.value); scheduleSave(); };

  const notes = document.getElementById("notesEdit");
  notes.onblur = ()=>{ c.notes=notes.textContent.trim(); scheduleSave(); };

  const tsel = document.getElementById("trackerSel");
  if(tsel) tsel.onchange = ()=>{
    const v=tsel.value;
    if(v===""){ c.trackerFile=""; c.trackerKey=""; scheduleSave(); render(); }
    else if(v==="__custom"){ c.trackerFile=""; c.trackerKey=""; scheduleSave(); render();
      const ti=document.getElementById("trackerInput"); if(ti) ti.focus(); }
    else {
      const t=KNOWN_TRACKERS.find(x=>x.file===v);
      if(t){ c.trackerFile=t.file; c.trackerKey=t.key; c.trackerUrl=BASE+t.file; c.goLiveManual=false; scheduleSave(); render(); pullGoLive(c); }
    }
  };
  const tin = document.getElementById("trackerInput");
  tin.oninput = ()=>{ c.trackerUrl=tin.value.trim();
    const match=KNOWN_TRACKERS.find(x=>BASE+x.file===c.trackerUrl);
    c.trackerFile = match?match.file:""; c.trackerKey = match?match.key:"";
    const a=document.getElementById("trackerOpen");
    a.href=c.trackerUrl||"#"; a.classList.toggle("disabled", !c.trackerUrl); };
  tin.onblur = ()=>scheduleSave();
  const gpull = document.getElementById("goLivePull");
  if(gpull) gpull.onclick = ()=>pullGoLive(c);
  // auto-pull once per session when a tracker is linked and the date isn't manually set
  if((c.trackerKey||c.trackerFile) && !c.goLiveManual && !pulledOnce.has(c.id)){ pulledOnce.add(c.id); pullGoLive(c); }

  document.querySelectorAll("[data-set]").forEach(b=>b.onclick=()=>{
    const [id,st]=b.dataset.set.split(":");
    const s = allSteps(c).find(x=>x.id===id);
    if(s){ s.status = (s.status===st ? "todo" : st); scheduleSave(); render(); }
  });
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    ["onboarding","offboarding"].forEach(k=>{ c[k]=c[k].filter(x=>x.id!==b.dataset.del); });
    scheduleSave(); render();
  });
  document.querySelectorAll("[data-label]").forEach(el=>{
    el.onblur=()=>{ const s=allSteps(c).find(x=>x.id===el.dataset.label); if(s){ s.label=el.textContent.trim(); scheduleSave(); } };
    el.onkeydown=(e)=>{ if(e.key==="Enter"){ e.preventDefault(); el.blur(); } };
  });
  document.querySelectorAll("[data-note]").forEach(el=>{
    el.onblur=()=>{ const s=allSteps(c).find(x=>x.id===el.dataset.note); if(s){ s.note=el.textContent.trim(); scheduleSave(); } };
    el.onkeydown=(e)=>{ if(e.key==="Enter"){ e.preventDefault(); el.blur(); } };
  });
  document.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.add; c[k].push({id:uid(),label:"New step",status:"todo",note:""}); scheduleSave(); render();
    // focus the new label
    const lists=document.querySelectorAll(`[data-list="${k}"] [data-label]`);
    const last=lists[lists.length-1]; if(last){ last.focus(); document.getSelection().selectAllChildren(last); }
  });
}

/* ============================ MODAL ============================ */
function openModal({title, body, fields, okLabel="Save", danger=false, onOk}){
  const bg = document.createElement("div"); bg.className="modal-bg";
  const fieldHtml = (fields||[]).map(f=>`
    <div class="field"><label>${f.label}</label><input data-f="${f.key}" value="${esc(f.value||'')}" ${f.key==='name'?'autofocus':''}></div>`).join("");
  bg.innerHTML = `<div class="modal">
    <h3>${title}</h3>
    ${body?`<p>${body}</p>`:""}
    ${fieldHtml}
    <div class="modal-actions">
      <button class="btn ghost" data-cancel>Cancel</button>
      <button class="btn ${danger?'primary':'primary'}" data-ok>${okLabel}</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  const close=()=>bg.remove();
  bg.querySelector("[data-cancel]").onclick=close;
  bg.onclick=(e)=>{ if(e.target===bg) close(); };
  const inputs=bg.querySelectorAll("[data-f]");
  if(inputs[0]) setTimeout(()=>inputs[0].focus(),30);
  const submit=()=>{ const v={}; inputs.forEach(i=>v[i.dataset.f]=i.value); close(); onOk&&onOk(v); };
  bg.querySelector("[data-ok]").onclick=submit;
  bg.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); submit(); } if(e.key==="Escape") close(); });
}

/* ============================ TOP-LEVEL ============================ */
document.getElementById("addClientBtn").onclick = ()=>{
  openModal({
    title:"Add client", fields:[{key:"name",label:"Client name",value:""},{key:"subtitle",label:"Subtitle / company (optional)",value:""}],
    okLabel:"Add client",
    onOk:(v)=>{ if(!v.name.trim()) return; const c=newClient(v.name,v.subtitle); state.clients.push(c); state.selectedId=c.id; shownStages().add(c.stage); savePrefs(); scheduleSave(); render(); }
  });
};

/* ============================ TEMPLATE EDITOR ============================ */
function openTemplateEditor(){
  const snap = {};
  ["onboarding","offboarding"].forEach(k => (state.templates[k]||[]).forEach(s => snap[s.id]=s.label));
  const work = {
    onboarding:  (state.templates.onboarding ||[]).map(s=>({id:s.id,label:s.label})),
    offboarding: (state.templates.offboarding||[]).map(s=>({id:s.id,label:s.label})),
  };
  let nid = 1;

  const teCol = (key,title,col)=>`<div class="te-col">
      <div class="te-col-head"><span class="dot" style="background:${col}"></span><h4>${title}</h4><span class="cnt" data-cnt="${key}"></span></div>
      <div class="te-list" data-tlist="${key}"></div>
      <button class="te-add" data-tadd="${key}">+ Add step</button>
    </div>`;

  const bg = document.createElement("div"); bg.className="modal-bg";
  bg.innerHTML = `<div class="modal te-modal">
    <h3>Standard checklist</h3>
    <p>The steps every new client starts with. Onboarding mirrors the Project Master Record columns.</p>
    <div class="te-scroll">
      <div class="te-cols">
        ${teCol("onboarding","Onboarding","#60A5FA")}
        ${teCol("offboarding","Offboarding","#FBBF24")}
      </div>
      <div class="te-note"><b>Renaming</b> a step also corrects it on all existing clients. <b>Adding or removing</b> a step affects new clients only — existing clients are left untouched.</div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" data-cancel>Cancel</button>
      <button class="btn primary" data-save>Save standard</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  const close = ()=>bg.remove();

  function renderList(key){
    const host = bg.querySelector(`[data-tlist="${key}"]`);
    host.innerHTML = work[key].map((s,i)=>`
      <div class="te-step">
        <span class="te-num">${i+1}</span>
        <input class="te-input" data-k="${key}" data-i="${i}" value="${esc(s.label)}" spellcheck="false">
        <button class="te-mv" data-up="${key}:${i}" ${i===0?'style="opacity:.25;pointer-events:none"':''}>↑</button>
        <button class="te-mv" data-dn="${key}:${i}" ${i===work[key].length-1?'style="opacity:.25;pointer-events:none"':''}>↓</button>
        <button class="te-del" data-rm="${key}:${i}" title="Remove step">×</button>
      </div>`).join("");
    bg.querySelector(`[data-cnt="${key}"]`).textContent = work[key].length+" steps";
    host.querySelectorAll(".te-input").forEach(inp=> inp.oninput=()=>{ work[inp.dataset.k][+inp.dataset.i].label = inp.value; });
    host.querySelectorAll("[data-up]").forEach(b=> b.onclick=()=>{ const [k,i]=b.dataset.up.split(":"); mv(k,+i,-1); });
    host.querySelectorAll("[data-dn]").forEach(b=> b.onclick=()=>{ const [k,i]=b.dataset.dn.split(":"); mv(k,+i,1); });
    host.querySelectorAll("[data-rm]").forEach(b=> b.onclick=()=>{ const [k,i]=b.dataset.rm.split(":"); work[k].splice(+i,1); renderList(k); });
  }
  function mv(k,i,d){ const j=i+d; if(j<0||j>=work[k].length) return; const a=work[k]; [a[i],a[j]]=[a[j],a[i]]; renderList(k); }

  bg.querySelectorAll("[data-tadd]").forEach(b=> b.onclick=()=>{
    const k=b.dataset.tadd; work[k].push({id:"tn"+(nid++),label:"New step"}); renderList(k);
    const inputs=bg.querySelectorAll(`[data-tlist="${k}"] .te-input`); const last=inputs[inputs.length-1];
    if(last){ last.focus(); last.select(); }
  });
  renderList("onboarding"); renderList("offboarding");

  bg.querySelector("[data-cancel]").onclick = close;
  bg.onclick = e=>{ if(e.target===bg) close(); };
  bg.addEventListener("keydown", e=>{ if(e.key==="Escape") close(); });

  bg.querySelector("[data-save]").onclick = ()=>{
    ["onboarding","offboarding"].forEach(k => work[k] = work[k].map(s=>({id:s.id,label:s.label.trim()})).filter(s=>s.label));
    if(!work.onboarding.length && !work.offboarding.length){ close(); return; }
    const renames = {};
    ["onboarding","offboarding"].forEach(k => work[k].forEach(s=>{
      if(snap[s.id]!==undefined && snap[s.id]!==s.label) renames[snap[s.id]] = s.label;
    }));
    if(Object.keys(renames).length){
      state.clients.forEach(c => ["onboarding","offboarding"].forEach(k =>
        (c[k]||[]).forEach(st=>{ if(renames[st.label]!==undefined) st.label = renames[st.label]; })));
    }
    state.templates = work;
    scheduleSave(); close(); render();
  };
}

document.getElementById("tmplBtn").onclick = openTemplateEditor;

/* ============================ BACKUP / RESTORE ============================ */
function normaliseLoaded(){
  if(!state.templates) state.templates = defaultTemplates();
  state.clients.forEach(c=>{
    if(c.goLiveDate===undefined) c.goLiveDate = "";
    ["onboarding","offboarding"].forEach(k=> (c[k]||[]).forEach(s=>{
      if(!s.status) s.status = s.done ? "done" : "todo"; delete s.done; if(s.note===undefined) s.note="";
    }));
  });
}
function exportBackup(){
  try{
    const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `sabel-client-portal-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    setSave("saved"); setTimeout(()=>setSave("idle"),1500);
  }catch(e){ openModal({title:"Backup failed", body:"Couldn't create the backup file in this browser.", okLabel:"OK"}); }
}
function importBackup(file){
  const r = new FileReader();
  r.onload = ()=>{
    let j; try{ j = JSON.parse(r.result); }catch(_){ j=null; }
    if(!j || !Array.isArray(j.clients)){
      openModal({title:"Couldn't read that file", body:"It doesn't look like a portal backup. Choose a .json file exported from this portal.", okLabel:"OK"});
      return;
    }
    openModal({
      title:"Restore this backup?",
      body:`This replaces everything currently in the portal with ${j.clients.length} clients from the backup. Consider taking a Backup of the current data first.`,
      okLabel:"Restore", danger:true,
      onOk:()=>{ state = j; normaliseLoaded(); state.selectedId=null; scheduleSave(); setView("portal"); render(); }
    });
  };
  r.readAsText(file);
}
document.getElementById("exportBtn").onclick = exportBackup;
document.getElementById("importBtn").onclick = ()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange = e=>{ const f=e.target.files[0]; if(f) importBackup(f); e.target.value=""; };

/* ============================ DASHBOARD ============================ */
function setView(v){
  view = v;
  const lv=document.getElementById("layoutView"); if(lv) lv.style.display = v==="portal" ? "" : "none";
  const dv=document.getElementById("dashboardView"); if(dv) dv.style.display = v==="dashboard" ? "" : "none";
  render();
}

function openClientFromDash(id){ state.selectedId=id; shownStages().add((state.clients.find(c=>c.id===id)||{}).stage); savePrefs(); setView("portal"); }

function renderDashboard(){
  const host = document.getElementById("dashboardView");
  const rows = state.clients.slice().sort(byGoLive);
  const withDate = rows.filter(c=>c.goLiveDate).length;
  const body = rows.map(c=>{
    const st=STAGES[c.stage]; const n=daysTo(c.goLiveDate);
    const tracker = c.trackerUrl
      ? `<a class="dash-track" href="${esc(c.trackerUrl)}" target="_blank" rel="noopener">Open tracker ↗</a>`
      : `<span class="dash-track off">No tracker</span>`;
    return `<tr>
      <td><button class="dash-name" data-open="${c.id}">${esc(c.name)}</button></td>
      <td><span class="stage" style="color:${st.c};background:${st.bg};border:1px solid ${st.bd}">${c.stage}</span></td>
      <td class="dash-owner">${esc(c.owner)||"<span class='muted'>—</span>"}</td>
      <td class="dash-date">${c.goLiveDate ? esc(fmtFull(c.goLiveDate)) : "<span class='muted'>Not set</span>"}</td>
      <td class="dash-days" style="color:${goLiveColour(n)}">${goLiveLabel(n)}</td>
      <td style="text-align:right">${tracker}</td>
    </tr>`;
  }).join("");
  host.innerHTML = `<div class="dash-inner">
    <div class="dash-head">
      <h2>Go-Live Dashboard</h2>
      <span class="dash-sub">${state.clients.length} clients · ${withDate} with a go-live date · sorted nearest first</span>
    </div>
    <div class="dash-table-wrap">
      <table class="dash-table">
        <thead><tr><th>Client</th><th>Stage</th><th>Owner</th><th>Go-Live</th><th>Countdown</th><th style="text-align:right">Tracker</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>
  </div>`;
  host.querySelectorAll("[data-open]").forEach(b=> b.onclick=()=>openClientFromDash(b.dataset.open));
}

function render(){
  if(view==="dashboard"){ renderDashboard(); return; }
  renderFilters(); renderClients(); renderMain();
}

(async function init(){
  await loadTrackerRegistry();   // pull the live tracker list before first paint
  await loadRemote();
  if(!state.clients.length){
    const local = readLocal();
    if(local){ try{ const j=JSON.parse(local); if(j&&Array.isArray(j.clients)) state=j; }catch(_){} }
  }
  // First run: nothing saved anywhere -> seed from the Project Master Record.
  if(!state.clients.length && Array.isArray(SEED) && SEED.length){
    state = { clients: SEED.map(c=>({ ...newClient(c.name,c.subtitle||""), ...c })), selectedId: null, templates: defaultTemplates() };
    saveLocal();
    if(remoteAvailable) pushRemote();
  }
  if(!state.templates) state.templates = defaultTemplates();  // migrate older saves
  // Normalise step model: ensure every step has a status (convert any legacy done flag).
  state.clients.forEach(c=>{
    if(c.goLiveDate===undefined) c.goLiveDate = GOLIVE[c.name] || "";  // prefill once from Drive
    if(c.trackerKey===undefined) c.trackerKey="";
    if(c.trackerFile===undefined) c.trackerFile="";
    if(c.goLiveManual===undefined) c.goLiveManual=false;
    // auto-link an existing pasted URL to a known tracker so go-live can pull
    if(!c.trackerFile && c.trackerUrl){
      const m=KNOWN_TRACKERS.find(x=>BASE+x.file===c.trackerUrl);
      if(m){ c.trackerFile=m.file; c.trackerKey=m.key; }
    }
    ["onboarding","offboarding"].forEach(k=> (c[k]||[]).forEach(s=>{
      if(!s.status) s.status = s.done ? "done" : "todo";
      delete s.done;
      if(s.note===undefined) s.note="";
    }));
  });
  loadPrefs();
  if(state.selectedId && !selected()) state.selectedId=null;
  render();
})();
</script>
