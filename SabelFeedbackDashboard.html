<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabel — Feedback Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1117;color:#E2E8F0;min-height:100vh;padding:28px 18px 70px}
.wrap{max-width:900px;margin:0 auto}
.head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.head img{height:26px}
.head .t{font-size:19px;font-weight:600}
.head .hub{font-size:12px;color:#94A3B8;text-decoration:none;border:1px solid #2A3145;border-radius:8px;padding:6px 12px;transition:all .15s}
.head .hub:hover{border-color:#E10600;color:#E2E8F0}
.rule{width:64px;height:2px;background:rgba(225,6,0,.55);border-radius:2px;margin:12px 0 18px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:#161B26;border:1px solid #1E2433;border-radius:10px;padding:12px 14px}
.stat .v{font-size:21px;font-weight:700}
.stat .l{font-size:11px;color:#94A3B8;margin-top:2px;line-height:1.4}
.bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.chip{border:1px solid #2A3145;background:#161B26;border-radius:18px;padding:5px 12px;font-size:12px;color:#94A3B8;cursor:pointer;font-family:inherit;transition:all .12s}
.chip:hover{border-color:#475569}
.chip.on{background:rgba(225,6,0,.15);border-color:#E10600;color:#fff}
#search{flex:1;min-width:150px;border:1px solid #2A3145;border-radius:18px;padding:6px 13px;font-size:12.5px;font-family:inherit;outline:none;background:#161B26;color:#E2E8F0}
#search:focus{border-color:#E10600}
.actbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.selall{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#94A3B8;cursor:pointer;user-select:none}
.selall input{accent-color:#E10600;width:15px;height:15px;cursor:pointer}
.xbtn{border:none;background:#E10600;color:#fff;border-radius:8px;padding:8px 16px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:filter .15s}
.xbtn:hover{filter:brightness(1.12)}
.xbtn:disabled{opacity:.5;cursor:default}
.rbtn{border:1px solid #2A3145;background:#161B26;color:#94A3B8;border-radius:8px;padding:8px 14px;font-size:12.5px;font-family:inherit;cursor:pointer}
.rbtn:hover{border-color:#475569;color:#E2E8F0}
.card{background:#161B26;border:1px solid #1E2433;border-radius:12px;margin-bottom:9px;overflow:hidden;transition:border-color .12s}
.card:hover{border-color:#2A3145}
.card.sel{border-color:rgba(225,6,0,.55)}
.card-head{padding:12px 15px;display:flex;gap:12px;align-items:center}
.card-head .cb{accent-color:#E10600;width:16px;height:16px;flex-shrink:0;cursor:pointer}
.card-main{flex:1;cursor:pointer;min-width:0}
.who{font-size:14px;font-weight:600}
.who .co{color:#F87171}
.meta{font-size:11.5px;color:#64748B;margin-top:2px}
.scores{text-align:right;flex-shrink:0;cursor:pointer}
.nps-b{display:inline-block;font-size:12px;font-weight:700;border-radius:6px;padding:3px 8px}
.nps-hi{background:rgba(74,222,128,.13);color:#4ADE80}.nps-mid{background:rgba(251,191,36,.13);color:#FBBF24}.nps-lo{background:rgba(248,113,113,.13);color:#F87171}
.stars{font-size:12px;color:#FBBF24;letter-spacing:1px;margin-top:3px}
.tags{padding:0 15px 11px 43px;display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;border-radius:12px;padding:2px 8px}
.t-ok{background:rgba(96,165,250,.13);color:#60A5FA}.t-anon{background:rgba(251,191,36,.13);color:#FBBF24}.t-int{background:rgba(192,132,252,.13);color:#C084FC}.t-low{background:rgba(248,113,113,.13);color:#F87171}
.detail{display:none;border-top:1px solid #1E2433;padding:14px 16px;background:#0F1117}
.detail h4{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#475569;margin:12px 0 4px}
.detail h4:first-child{margin-top:0}
.detail p{font-size:13px;line-height:1.6;color:#CBD5E1;white-space:pre-wrap}
.quote{border-left:3px solid #E10600;padding:8px 12px;background:#161B26;border-radius:0 8px 8px 0;font-style:italic}
.internal{border-left:3px solid #34D399;padding:8px 12px;background:rgba(52,211,153,.07);border-radius:0 8px 8px 0}
.state{background:#161B26;border:1px solid #1E2433;border-radius:12px;padding:44px 24px;text-align:center;font-size:13.5px;color:#94A3B8;line-height:1.7}
.foot{font-size:11px;color:#475569;text-align:center;margin-top:20px;line-height:1.7}
#gate{position:fixed;inset:0;background:#0F1117;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
#gate .g{background:#161B26;border:1px solid #1E2433;border-radius:14px;padding:34px 30px;max-width:340px;width:100%;text-align:center}
#gate img{height:26px;margin-bottom:16px}
#gate p{font-size:13px;color:#94A3B8;margin-bottom:14px}
#gate input{width:100%;background:#0F1117;border:1px solid #2A3145;border-radius:8px;padding:10px 12px;color:#E2E8F0;font-size:14px;font-family:inherit;outline:none;text-align:center;margin-bottom:10px}
#gate input:focus{border-color:#E10600}
#gate button{width:100%;background:#E10600;border:none;border-radius:8px;padding:11px;color:#fff;font-weight:600;font-size:13.5px;font-family:inherit;cursor:pointer}
#gate .ge{font-size:12px;color:#F87171;margin-top:9px;display:none}
@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
// ==== SETTINGS ====
const HUB_URL='';   // paste your Ops Hub URL here to show the back button
// The passcode is NOT stored in this file. It is checked by the server:
// it must match the FEEDBACK_READ_TOKEN environment variable in Vercel.
// To change the passcode, change that variable and redeploy.
// ==================
const API='https://sabel-webhook.vercel.app/api/feedback?key=sabel-feedback-v1';
let ENTRIES=[],FILTERS={},Q='',TOKEN=sessionStorage.getItem('sfd_tok')||'';
const SELECTED=new Set();

function showApp(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';}
function showGate(msg){
  document.getElementById('gate').style.display='flex';
  document.getElementById('app').style.display='none';
  const g=document.getElementById('ge');
  if(msg){g.textContent=msg;g.style.display='block';} else g.style.display='none';
}
async function checkPw(){
  TOKEN=document.getElementById('pw').value.trim();
  await load();
}
if(HUB_URL){const h=document.getElementById('hublink');h.href=HUB_URL;h.style.display='inline-block';}

const star=n=>n?'★'.repeat(n)+'☆'.repeat(5-n):'';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const isLow=e=>(e.nps!=null&&e.nps<=6)||Object.values(e.ratings||{}).some(v=>v<=2);
const eid=e=>e.ts+'|'+(e.name||'');

function stats(){
  const n=ENTRIES.length;
  const nps=ENTRIES.filter(e=>e.nps!=null);
  const avgN=nps.length?(nps.reduce((a,e)=>a+e.nps,0)/nps.length).toFixed(1):'-';
  const ov=ENTRIES.map(e=>(e.ratings||{}).r_overall).filter(Boolean);
  const avgO=ov.length?(ov.reduce((a,b)=>a+b,0)/ov.length).toFixed(1):'-';
  const rf=ENTRIES.filter(e=>e.referral&&e.referral.name).length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="v">${n}</div><div class="l">Responses</div></div>`+
    `<div class="stat"><div class="v">${avgN}</div><div class="l">Average NPS (0-10)</div></div>`+
    `<div class="stat"><div class="v">${avgO}</div><div class="l">Average overall (of 5)</div></div>`+
    `<div class="stat"><div class="v">${rf}</div><div class="l">Referrals received</div></div>`;
}
function visible(){
  return ENTRIES.filter(e=>{
    const c=e.consent||{};
    for(const k of ['intercom','marketing','social','anonymise','casestudy']) if(FILTERS[k]&&!c[k]) return false;
    if(FILTERS.referral&&!(e.referral&&e.referral.name)) return false;
    if(FILTERS.low&&!isLow(e)) return false;
    if(Q){
      const blob=[e.name,e.company,e.role,e.testimonial,e.valued,e.results,e.challenge,e.improve_internal_only,e.attribution,(e.referral||{}).name].join(' ').toLowerCase();
      if(!blob.includes(Q)) return false;
    }
    return true;
  });
}
function render(){
  stats();
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('on',!!FILTERS[ch.dataset.f]));
  const vs=visible();
  const list=document.getElementById('list');
  document.getElementById('xlsx').textContent=SELECTED.size?`Export selected (${SELECTED.size}) to Excel`:'Export all shown to Excel';
  if(!ENTRIES.length){list.innerHTML='<div class="state"><strong>No feedback yet.</strong><br>Responses appear here as soon as a client submits the form.</div>';return;}
  if(!vs.length){list.innerHTML='<div class="state">No responses match the current filters.</div>';return;}
  list.innerHTML=vs.map(e=>{
    const c=e.consent||{},r=e.ratings||{},rf=e.referral||{};
    const id=eid(e);
    const npsCls=e.nps>=9?'nps-hi':e.nps>=7?'nps-mid':'nps-lo';
    const d=e.ts?new Date(e.ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
    const tags=[
      c.intercom?'<span class="tag t-ok">Intercom/Fin</span>':'',
      c.marketing?'<span class="tag t-ok">Marketing</span>':'',
      c.social?'<span class="tag t-ok">LinkedIn</span>':'',
      c.casestudy?'<span class="tag t-int">Case study OK</span>':'',
      rf.name?'<span class="tag t-int">Referral</span>':'',
      c.anonymise?'<span class="tag t-anon">Anonymise</span>':'',
      isLow(e)?'<span class="tag t-low">Low score</span>':''
    ].join('');
    const sec=(t,v,cls)=>v?`<h4>${t}</h4><p class="${cls||''}">${esc(v)}</p>`:'';
    return `<div class="card${SELECTED.has(id)?' sel':''}" data-id="${esc(id)}">
      <div class="card-head">
        <input type="checkbox" class="cb" ${SELECTED.has(id)?'checked':''} onclick="toggleSel(event,this)">
        <div class="card-main" onclick="toggleDetail(this)">
          <div class="who">${esc(e.name)}${e.role?', '+esc(e.role):''} <span class="co">· ${esc(e.company)}</span></div>
          <div class="meta">${d}${e.project?' · '+esc(e.project):''}${e.email?' · '+esc(e.email):''}</div>
        </div>
        <div class="scores" onclick="toggleDetail(this)"><span class="nps-b ${npsCls}">NPS ${e.nps??'-'}</span><div class="stars">${star(r.r_overall)}</div></div>
      </div>
      <div class="tags">${tags}</div>
      <div class="detail">
        ${sec('Testimonial',e.testimonial,'quote')}
        ${sec('Challenge they came with',e.challenge)}
        ${sec('Results since go-live',e.results)}
        ${sec('What they valued most',e.valued)}
        ${sec('Improvement note (internal only, never publish)',e.improve_internal_only,'internal')}
        <h4>Ratings</h4><p>Communication ${star(r.r_comms)||'-'} · Quality ${star(r.r_quality)||'-'} · Handover ${star(r.r_handover)||'-'} · Overall ${star(r.r_overall)||'-'}</p>
        ${sec('Preferred attribution',e.attribution)}
        ${rf.name?sec('Referral',rf.name+(rf.contact?' · '+rf.contact:'')+(rf.mention_ok?' · OK to mention their name':' · do NOT mention their name')):''}
      </div>
    </div>`;
  }).join('');
}
function toggleDetail(el){
  const d=el.closest('.card').querySelector('.detail');
  d.style.display=d.style.display==='block'?'none':'block';
}
function toggleSel(ev,cb){
  ev.stopPropagation();
  const id=cb.closest('.card').dataset.id;
  cb.checked?SELECTED.add(id):SELECTED.delete(id);
  cb.closest('.card').classList.toggle('sel',cb.checked);
  document.getElementById('xlsx').textContent=SELECTED.size?`Export selected (${SELECTED.size}) to Excel`:'Export all shown to Excel';
}
document.getElementById('selall').onchange=function(){
  const vs=visible();
  vs.forEach(e=>this.checked?SELECTED.add(eid(e)):SELECTED.delete(eid(e)));
  render();
};
document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{FILTERS[ch.dataset.f]=!FILTERS[ch.dataset.f];render();});
document.getElementById('search').oninput=e=>{Q=e.target.value.trim().toLowerCase();render();};

document.getElementById('xlsx').onclick=()=>{
  const pool=SELECTED.size?ENTRIES.filter(e=>SELECTED.has(eid(e))):visible();
  if(!pool.length) return;
  const yn=v=>v?'Yes':'No';
  const rows=pool.map(e=>{
    const r=e.ratings||{},c=e.consent||{},rf=e.referral||{};
    return {
      'Date':e.ts?e.ts.slice(0,10):'','Name':e.name||'','Role':e.role||'','Company':e.company||'','Email':e.email||'','Project':e.project||'',
      'NPS (0-10)':e.nps,'Comms (1-5)':r.r_comms,'Quality (1-5)':r.r_quality,'Handover (1-5)':r.r_handover,'Overall (1-5)':r.r_overall,
      'Challenge':e.challenge||'','Results since go-live':e.results||'','Valued most':e.valued||'','Testimonial':e.testimonial||'',
      'Internal-only note (never publish)':e.improve_internal_only||'',
      'Intercom/Fin':yn(c.intercom),'Marketing':yn(c.marketing),'LinkedIn/Social':yn(c.social),'Anonymise':yn(c.anonymise),'Case study OK':yn(c.casestudy),
      'Attribution':e.attribution||'','Referral name':rf.name||'','Referral contact':rf.contact||'','Mention referrer OK':rf.name?yn(rf.mention_ok):''
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:11},{wch:20},{wch:22},{wch:20},{wch:24},{wch:22},{wch:10},{wch:11},{wch:11},{wch:12},{wch:11},{wch:40},{wch:40},{wch:40},{wch:46},{wch:40},{wch:12},{wch:11},{wch:14},{wch:11},{wch:13},{wch:34},{wch:24},{wch:24},{wch:16}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Responses');
  XLSX.writeFile(wb,'Sabel_Feedback_'+new Date().toISOString().slice(0,10)+'.xlsx');
};

async function load(){
  try{
    const r=await fetch(API+'&token='+encodeURIComponent(TOKEN));
    if(r.status===401){sessionStorage.removeItem('sfd_tok');showGate('Not quite, try again.');return;}
    const data=await r.json();
    if(data.ok===false){sessionStorage.removeItem('sfd_tok');showGate('Not quite, try again.');return;}
    sessionStorage.setItem('sfd_tok',TOKEN);
    showApp();
    ENTRIES=(data.entries||[]).slice().sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
    render();
  }catch(e){
    if(document.getElementById('app').style.display==='block'){
      document.getElementById('list').innerHTML='<div class="state"><strong>Could not load feedback data.</strong><br>Check that api/feedback.js is deployed to sabel-webhook, then press Refresh.</div>';
    } else showGate('Could not reach the server. Check the backend is deployed, then try again.');
  }
}
if(TOKEN) load();
</script>
