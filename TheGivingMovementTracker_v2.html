<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabel × The Giving Movement · Project Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1117;color:#E2E8F0;min-height:100vh}
.pw{display:grid;grid-template-columns:176px 1fr;min-height:100vh}
.sb{display:flex;flex-direction:column;background:#161B26;border-right:1px solid #1E2433}
.sb-head{padding:16px 14px 14px;border-bottom:1px solid #1E2433}
.sb-logo{height:22px;margin-bottom:8px}
.sb-title{font-size:13px;font-weight:600;color:#E2E8F0}
.sb-sub{font-size:11px;color:#94A3B8;margin-top:1px}
.si{display:block;width:100%;text-align:left;border:none;cursor:pointer;padding:10px 14px;font-family:inherit;background:transparent;border-bottom:1px solid #1E2433;transition:background .12s}
.si:hover{background:#1E2433}
.sb-sec{padding:5px 14px 3px;font-size:10px;font-weight:600;letter-spacing:.08em;color:#475569;text-transform:uppercase;border-bottom:1px solid #1E2433}
.sb-footer{margin-top:auto;padding:14px;border-top:1px solid #1E2433}
.mn{padding:1.5rem;background:#0F1117}
/* cards — overflow:visible so status picker floats above */
.task{background:#161B26;border:1px solid #1E2433;border-radius:10px;margin-bottom:7px;overflow:visible;transition:border-color .12s;position:relative}
.task:hover{border-color:#2A3145}
.task-client{background:#0F1117;border:1px solid rgba(251,191,36,.28);border-radius:10px;margin-bottom:7px;overflow:visible;transition:border-color .12s;position:relative}
.task-client:hover{border-color:rgba(251,191,36,.5)}
.task.done,.task-client.done{opacity:.65}
.task-inner{border-radius:10px;overflow:hidden}
.task-head{padding:10px 12px;cursor:grab;user-select:none}
.col-drop{border:2px dashed rgba(96,165,250,.45)!important;background:rgba(96,165,250,.04)!important;border-radius:10px!important}
.card-dragging{opacity:.35!important}
.add-task-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;background:transparent;border:1px dashed #1E2433;border-radius:8px;color:#475569;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:6px}
.add-task-btn:hover{border-color:#3B82F6;color:#60A5FA;background:rgba(59,130,246,.05)}
.task-expand{border-top:1px solid #1E2433;padding:12px;background:#0F1117;display:none}
.task-expand textarea,.task-expand input{width:100%;font-size:12px;color:#E2E8F0;background:#161B26;border:1px solid #2A3145;border-radius:6px;padding:7px 10px;font-family:inherit;line-height:1.5;outline:none}
.task-expand textarea{resize:vertical}
.task-expand textarea:focus,.task-expand input:focus{border-color:#3B82F6}
.task-expand label{font-size:11px;font-weight:500;color:#94A3B8;display:block;margin-bottom:4px}
.chk-btn{background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;display:flex;align-items:flex-start;padding-top:1px}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
/* status picker trigger */
.stat-bdg{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:2px 6px 2px 8px;font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:inherit;flex-shrink:0}
.stat-bdg:hover{filter:brightness(1.15)}
/* filter stat cards */
.sc{border-radius:8px;padding:10px 12px;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none;text-align:left;font-family:inherit;width:100%}
.sc.f-on{background:#161B26;border-color:#1E2433}.sc.f-on.active{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4)}
.sc.f-att{background:#161B26;border-color:#1E2433}.sc.f-att.active{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4)}
.sc.f-risk{background:#161B26;border-color:#1E2433}.sc.f-risk.active{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.4)}
.col-head{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin:0 0 8px;display:flex;align-items:center;gap:5px}
.phase-cols{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start}
.ov-top{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.empty-col{font-size:12px;color:#334155;padding:20px 0;text-align:center}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ph-card{background:#161B26;border:1px solid #1E2433;border-radius:10px;padding:12px;cursor:pointer;transition:border-color .12s}
.ph-card:hover{border-color:#3B82F6}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.5rem}
/* phase view top row: completion card beside the filter stat cards, to reduce scroll */
.phase-top{display:grid;grid-template-columns:minmax(190px,1fr) 1.7fr;gap:1rem;align-items:stretch;margin-bottom:1rem}
@media(max-width:760px){.phase-top{grid-template-columns:1fr}}
.toast{position:fixed;bottom:20px;right:20px;background:#1E2433;border:1px solid #2A3145;border-radius:8px;padding:9px 14px;font-size:12px;color:#94A3B8;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1001}
.toast.show{opacity:1}
.filter-hint{font-size:11px;color:#475569;display:flex;align-items:center;gap:4px;margin-top:6px}
/* floating status picker */
#status-picker,#owner-picker,#add-picker{position:fixed;display:none;background:#1E2433;border:1px solid #2A3145;border-radius:9px;padding:4px;z-index:1000;min-width:158px;max-height:300px;overflow-y:auto;box-shadow:0 6px 24px rgba(0,0,0,.5)}
#add-picker{min-width:240px;max-width:320px}
#status-picker button,#owner-picker button,#add-picker button{display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;background:transparent;border:none;cursor:pointer;font-family:inherit;border-radius:5px;transition:background .1s;text-align:left}
#status-picker button:hover,#owner-picker button:hover,#add-picker button:hover{background:rgba(255,255,255,.06)}
/* tooltip */
#tip-box{position:fixed;display:none;background:#1E2433;border:1px solid #2A3145;border-radius:8px;padding:9px 12px;font-size:12px;color:#E2E8F0;max-width:240px;line-height:1.5;z-index:1002;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}
/* autosave indicator */
#autosave-dot{position:fixed;top:14px;right:16px;font-size:11px;color:#475569;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .4s;z-index:999}
#autosave-dot.show{opacity:1}
</style>
</head>
<body>
<div class="pw">
  <div class="sb" id="sidebar"></div>
  <div class="mn" id="main"></div>
</div>
<div id="status-picker"></div>
<div id="owner-picker"></div>
<div id="add-picker"></div>
<div id="tip-box"></div>
<div id="autosave-dot"><i class="ti ti-cloud-check" style="font-size:13px"></i>Autosaved</div>
<div class="toast" id="toast"></div>

// ── Auto-save ─────────────────────────────────────────────────────────────────
function scheduleAutoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveState(),800);
}
async function saveState(){
  const payload={buildV:BUILD_V,goLive:goLiveDate,groupBy,statuses:{},notes:cardNotes,links:cardLinks,origStatus,taskData:{}};
  P.forEach(ph=>{
    payload.taskData[ph.id]={sabel:[...T[ph.id].sabel],client:[...T[ph.id].client]};
    ['sabel','client'].forEach(grp=>{
      T[ph.id][grp].forEach((t,i)=>{ payload.statuses[ph.id+'-'+(grp==='sabel'?'s':'c')+'-'+i]=t.s; });
    });
  });
  try{
    await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:KEY,value:JSON.stringify(payload)})});
    showAutosaved();
  }catch(e){showToast('Save failed');}
}
async function loadInitial(){
  try{
    const r=await fetch(API+'?key='+KEY);
    const j=await r.json();
    if(j&&j.value){
      const d=typeof j.value==='string'?JSON.parse(j.value):j.value;
      if(d.buildV!==undefined&&d.buildV!==BUILD_V){showToast('Plan updated since last save, showing the new plan');return;}
      if(d.taskData){
        P.forEach(ph=>{
          if(d.taskData[ph.id]){
            if(d.taskData[ph.id].sabel&&d.taskData[ph.id].sabel.length) T[ph.id].sabel=d.taskData[ph.id].sabel;
            if(d.taskData[ph.id].client&&d.taskData[ph.id].client.length) T[ph.id].client=d.taskData[ph.id].client;
          }
        });
      }
      if(d.statuses) Object.entries(d.statuses).forEach(([k,v])=>{
        const parts=k.split('-');
        const idx=parseInt(parts[parts.length-1]);
        const gs=parts[parts.length-2];
        const phId=parts.slice(0,parts.length-2).join('-');
        const gf=gs==='c'?'client':'sabel';
        if(T[phId]&&T[phId][gf]&&T[phId][gf][idx]) T[phId][gf][idx].s=v;
      });
      if(d.notes) cardNotes=d.notes;
      if(d.links) cardLinks=d.links;
      if(d.origStatus) origStatus=d.origStatus;
      if(d.goLive!==undefined) goLiveDate=d.goLive;
      if(d.groupBy) groupBy=d.groupBy;
      render();
    }
  }catch(e){showToast('Could not load saved progress');}
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showAutosaved(){
  const d=document.getElementById('autosave-dot');
  d.classList.add('show');
  clearTimeout(d._t);
  d._t=setTimeout(()=>d.classList.remove('show'),2000);
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function globalStats(){
  let total=0,complete=0,usedH=0,on=0,att=0,risk=0;
  P.forEach(ph=>{
    const tasks=[...T[ph.id].sabel,...T[ph.id].client];
    const done=tasks.filter(t=>t.s==='Complete').length;
    const inprog=tasks.filter(t=>t.s==='In Progress').length;
    total+=tasks.length;complete+=done;
    if(tasks.length>0)usedH+=((done+inprog*.5)/tasks.length)*ph.h;
    tasks.forEach(t=>{
      if(['Complete','In Progress'].includes(t.s))on++;
      else if(t.s==='Blocked')risk++;
      else att++;
    });
  });
  return{total,complete,usedH:Math.round(usedH),on,att,risk};
}
function phaseStats(id){
  const ph=P.find(p=>p.id===id);
  const tasks=[...T[id].sabel,...T[id].client];
  let on=0,att=0,risk=0,done=0,inprog=0;
  tasks.forEach(t=>{
    if(t.s==='Complete'){on++;done++;}
    else if(t.s==='In Progress'){on++;inprog++;}
    else if(t.s==='Blocked')risk++;
    else att++;
  });
  const consumed=tasks.length>0?Math.round(((done+inprog*.5)/tasks.length)*ph.h):0;
  return{on,att,risk,consumed,done,total:tasks.length};
}
function phaseMini(id){
  const tasks=[...T[id].sabel,...T[id].client];

// ── Week grouping + scheduling helpers ────────────────────────────────────────
const WEEK1_START='2026-05-11';  // [CLIENT] Monday of Week 1; the week-grid anchor. Task dates derive from this.
function weekStartDate(n){const d=new Date(WEEK1_START+'T00:00:00');d.setDate(d.getDate()+(n-1)*7);return d;}
function isoDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+da;}
function weekRangeLabel(n){if(!n||n<1)return 'Unscheduled';const s=weekStartDate(n),e=new Date(s);e.setDate(e.getDate()+6);const f=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});return f(s)+' – '+f(e);}
function weekLabel(n){return (n&&n>=1)?'Week '+n:'Unscheduled';}
function maxWeek(){let mx=0;P.forEach(ph=>['sabel','client'].forEach(g=>T[ph.id][g].forEach(t=>{if(t.week&&t.week>mx)mx=t.week;})));return Math.max(mx,8);}
function weekOptions(sel){let o='';const mx=maxWeek();for(let n=1;n<=mx;n++){o+=`<option value="${n}"${sel===n?' selected':''}>Week ${n} · ${weekRangeLabel(n)}</option>`;}return o;}
function effWeek(t){return weekLabel(t.week||0);}
function weekList(){
  const seen=new Set();
  P.forEach(ph=>['sabel','client'].forEach(g=>T[ph.id][g].forEach(t=>seen.add(effWeek(t)))));
  const arr=[...seen];
  const num=w=>{const m=/(\d+)/.exec(w);return m?parseInt(m[1]):9999;};
  arr.sort((a,b)=>{if(a==='Unscheduled')return 1;if(b==='Unscheduled')return -1;return num(a)-num(b)||a.localeCompare(b);});
  return arr;
}
function weekGroups(wk){
  const out={sabel:[],client:[]};
  P.forEach(ph=>['sabel','client'].forEach(g=>{
    T[ph.id][g].forEach((t,i)=>{ if(effWeek(t)===wk) out[g].push({t,cid:ph.id+'-'+(g==='sabel'?'s':'c')+'-'+i,c:ph.c,l:ph.l}); });
  }));
  return out;
}
function weekMini(wk){const g=weekGroups(wk);const a=[...g.sabel,...g.client];return{done:a.filter(o=>o.t.s==='Complete').length,total:a.length};}
function weekStats(wk){
  const g=weekGroups(wk);const a=[...g.sabel,...g.client];let on=0,att=0,risk=0,done=0;
  a.forEach(o=>{const s=o.t.s;if(s==='Complete'){on++;done++;}else if(s==='In Progress')on++;else if(s==='Blocked')risk++;else att++;});
  return{on,att,risk,done,total:a.length,client:g.client,sabel:g.sabel};
}
function currentWeek(){
  const w1=new Date(WEEK1_START+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  let n=Math.floor((now-w1)/(7*86400000))+1; return n<1?1:n;
}
function focusWeek(){
  const cw=currentWeek(), mx=maxWeek();
  const has=n=>{const g=weekGroups('Week '+n);return (g.sabel.length+g.client.length)>0;};
  if(has(cw))return{n:cw,now:true};
  for(let n=cw+1;n<=mx+8;n++){ if(has(n))return{n,now:false}; }
  return{n:cw,now:true};
}

function resolveTask(cid){
  const parts=cid.split('-');
  const idx=parseInt(parts[parts.length-1]);
  const gs=parts[parts.length-2];
  const phId=parts.slice(0,parts.length-2).join('-');
  const gf=gs==='c'?'client':'sabel';
  return T[phId]&&T[phId][gf]&&T[phId][gf][idx];
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function bdg(txt,c,bg){return`<span class="bdg" style="color:${c};background:${bg}">${txt}</span>`;}
function ownerBtn(o,cid){const x=OW[o]||OW.Chris;return`<button class="stat-bdg" style="color:${x.c};background:${x.bg}" onclick="openOwnerPicker(event,'${cid}')" title="Change owner">${o}<i class="ti ti-chevron-down" style="font-size:9px;opacity:.7;margin-left:1px"></i></button>`;}
function oBdg(o){const x=OW[o]||OW.Chris;return bdg(o,x.c,x.bg);}
function gradBar(pct,h=12){

    <div style="width:100%;height:100%;background:linear-gradient(to right,#E10600 0%,#FBBF24 50%,#4ADE80 100%);clip-path:inset(0 ${100-p2}% 0 0)"></div>

}

// ── Toggle complete (checkbox) ────────────────────────────────────────────────
function toggleComplete(e,cid){
  e.stopPropagation();

  if(t.s==='Complete'){

function addStdTask(phId,grp,i){

function closeAddMenu(){

function deleteTask(e,cid){
  e.stopPropagation();
  const t=resolveTask(cid);if(!t)return;
  if(!confirm('Remove this task from the tracker?'))return;
  const parts=cid.split('-');
  const idx=parseInt(parts[parts.length-1]);
  const gs=parts[parts.length-2];
  const phId=parts.slice(0,parts.length-2).join('-');
  const grp=gs==='c'?'client':'sabel';
  remapCids(phId,grp,idx);
  T[phId][grp].splice(idx,1);
  render();
  scheduleAutoSave();
}

// ── Drag and drop ─────────────────────────────────────────────────────────────
function remapCids(phId,grp,removedIdx){
  const gs=grp==='sabel'?'s':'c';
  const len=T[phId][grp].length+1;
  for(let i=removedIdx+1;i<len;i++){
    const o=phId+'-'+gs+'-'+i,n=phId+'-'+gs+'-'+(i-1);
    if(cardNotes[o]!==undefined){cardNotes[n]=cardNotes[o];delete cardNotes[o];}
    if(cardLinks[o]!==undefined){cardLinks[n]=cardLinks[o];delete cardLinks[o];}
    if(origStatus[o]!==undefined){origStatus[n]=origStatus[o];delete origStatus[o];}
    if(expandedCards.has(o)){expandedCards.delete(o);expandedCards.add(n);}
  }
  const rc=phId+'-'+gs+'-'+removedIdx;
  delete cardNotes[rc];delete cardLinks[rc];delete origStatus[rc];expandedCards.delete(rc);
}
function clearDropHighlight(){
  if(dragOverCol){const el=document.getElementById(dragOverCol);if(el)el.classList.remove('col-drop');dragOverCol=null;}
}
function onDragStart(e,phId,grp,idx){
  // Ignore drags that begin on an interactive control (owner/status picker,
  // checkbox, link, input) so a click on those controls is never swallowed by
  // the drag-to-reassign gesture. This keeps the owner dropdown reliably clickable.
  if(e.target.closest('button,input,textarea,a,select')){e.preventDefault();return;}
  dragInfo={phId,grp,idx};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const card=e.currentTarget;if(card)card.classList.add('card-dragging');},0);
}
function onDragEnd(e){
  e.currentTarget.classList.remove('card-dragging');
  clearDropHighlight();
}
function onDragOver(e,colId){
  e.preventDefault();
  if(dragOverCol!==colId){clearDropHighlight();dragOverCol=colId;const el=document.getElementById(colId);if(el)el.classList.add('col-drop');}
}
function onDragLeave(e,colId){
  if(!e.currentTarget.contains(e.relatedTarget)){const el=document.getElementById(colId);if(el)el.classList.remove('col-drop');if(dragOverCol===colId)dragOverCol=null;}
}
function onDrop(e,tPhId,tGrp){
  e.preventDefault();
  clearDropHighlight();
  if(!dragInfo)return;
  const{phId:sPhId,grp:sGrp,idx:sIdx}=dragInfo;dragInfo=null;
  if(sPhId===tPhId&&sGrp===tGrp)return;
  const sCid=sPhId+'-'+(sGrp==='sabel'?'s':'c')+'-'+sIdx;
  const keepNotes=cardNotes[sCid],keepLink=cardLinks[sCid],keepOrig=origStatus[sCid],wasOpen=expandedCards.has(sCid);
  const task={...T[sPhId][sGrp][sIdx]};
  if(tGrp==='client'){task.o=CLIENT_LABEL;if(!task.tip)task.tip='';}
  else{if(!SABEL_TEAM.includes(task.o))task.o='Chris';delete task.tip;}
  remapCids(sPhId,sGrp,sIdx);
  T[sPhId][sGrp].splice(sIdx,1);
  T[tPhId][tGrp].push(task);
  const tCid=tPhId+'-'+(tGrp==='sabel'?'s':'c')+'-'+(T[tPhId][tGrp].length-1);
  if(keepNotes!==undefined)cardNotes[tCid]=keepNotes;
  if(keepLink!==undefined)cardLinks[tCid]=keepLink;
  if(keepOrig!==undefined)origStatus[tCid]=keepOrig;
  if(wasOpen)expandedCards.add(tCid);
  render();
  scheduleAutoSave();
}

}

  scheduleAutoSave();

function setTaskWeek(cid,val){
  const t=resolveTask(cid);if(!t)return;

function setTaskWeekByDate(cid,val){
  const t=resolveTask(cid);if(!t||!val)return;
  const picked=new Date(val+'T00:00:00'), w1=new Date(WEEK1_START+'T00:00:00');
  let n=Math.floor((picked-w1)/(7*86400000))+1; if(n<1)n=1;
  t.week=n; renderMain(); scheduleAutoSave();

function setGroupBy(mode){

// ── Go-live date editing ──────────────────────────────────────────────────────
function toggleGoLiveEdit(e){ if(e)e.stopPropagation(); editingGoLive=true; renderMain(); }
function cancelGoLiveEdit(e){ if(e)e.stopPropagation(); editingGoLive=false; renderMain(); }
function setGoLive(val){
  const old=goLiveDate; goLiveDate=val; editingGoLive=false;
  if(old&&val){
    const o=new Date(old+'T00:00:00'), n=new Date(val+'T00:00:00');
    if(!isNaN(o)&&!isNaN(n)){
      const dw=Math.round((n-o)/(7*86400000));
      if(dw!==0){
        P.forEach(ph=>['sabel','client'].forEach(g=>T[ph.id][g].forEach(t=>{
          if(t.s!=='Complete'&&t.week&&t.week>=1) t.week=Math.max(1,t.week+dw);
        })));
        showToast('Go-live moved · unfinished tasks shifted '+Math.abs(dw)+' week'+(Math.abs(dw)>1?'s':'')+(dw>0?' later':' earlier'));
      }
    }
  }
  render(); scheduleAutoSave();
}

function goLiveCard(){
  // Go-live countdown, styled as a card so it sits beside Overall completion
  // in the overview top row. Returns '' when no go-live date is set.
  const accentBase='#E10600';
  // Edit mode: show a date picker (also reachable when there is currently no date).
  if(editingGoLive){
    return `<div style="background:linear-gradient(135deg,rgba(225,6,0,.12),rgba(225,6,0,.02));border:1px solid ${accentBase}55;border-radius:10px;padding:16px;display:flex;flex-direction:column">
      <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:${accentBase};display:flex;align-items:center;gap:6px;margin-bottom:14px"><i class="ti ti-rocket" style="font-size:13px"></i>Go-live</div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px">
        <label style="font-size:12px;color:#94A3B8">Set the go-live date</label>
        <input type="date" value="${goLiveDate||''}" onchange="setGoLive(this.value)" onclick="event.stopPropagation()" style="width:100%;font-size:13px;color:#E2E8F0;background:#161B26;border:1px solid #2A3145;border-radius:6px;padding:8px 10px;font-family:inherit;box-sizing:border-box">
        <button onclick="cancelGoLiveEdit(event)" style="align-self:flex-start;background:transparent;border:1px solid #2A3145;color:#94A3B8;font-size:11px;font-family:inherit;border-radius:6px;padding:5px 12px;cursor:pointer">Cancel</button>
      </div>
    </div>`;
  }
  if(!goLiveDate) return '';
  const gl=new Date(goLiveDate+'T00:00:00');
  if(isNaN(gl.getTime())) return '';
  const now=new Date(); now.setHours(0,0,0,0);
  const days=Math.ceil((gl-now)/86400000);
  const dateStr=gl.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let big,sub,accent=accentBase;
  if(days>0){ big=days; sub=(days===1?'day ':'days ')+'until go-live'; }
  else if(days===0){ big='Today'; sub='go-live day'; accent='#4ADE80'; }
  else { big='Live'; sub='launched '+Math.abs(days)+' days ago'; accent='#4ADE80'; }
  const numeric=typeof big==='number';
  return `<div style="background:linear-gradient(135deg,rgba(225,6,0,.12),rgba(225,6,0,.02));border:1px solid ${accent}55;border-radius:10px;padding:16px;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:${accent};display:flex;align-items:center;gap:6px"><i class="ti ti-rocket" style="font-size:13px"></i>Go-live</div>
      <button onclick="toggleGoLiveEdit(event)" title="Edit go-live date" style="background:transparent;border:none;cursor:pointer;color:#64748B;padding:2px;display:flex"><i class="ti ti-pencil" style="font-size:13px"></i></button>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px 0">
      <span style="font-size:${numeric?'58':'40'}px;font-weight:700;color:${accent};line-height:.95;font-variant-numeric:tabular-nums">${big}</span>
      <span style="font-size:12px;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em;margin-top:8px">${sub}</span>
    </div>
    <div style="border-top:1px solid ${accent}33;padding-top:12px">
      <div style="font-size:13px;font-weight:600;color:#E2E8F0">${dateStr}</div>
      <div style="font-size:12px;color:#94A3B8;margin-top:4px;display:flex;align-items:flex-start;gap:5px"><i class="ti ti-flag" style="font-size:12px;color:${accent};margin-top:2px;flex-shrink:0"></i><span>${GO_LIVE_NOTE}</span></div>
    </div>
  </div>`;
}

          <div style="border-radius:10px;padding:2px;min-height:50px">
            ${visClient.length?visClient.map(o=>makeCard(o.t,o.cid,true,{c:o.c,l:o.l,noDrag:true})).join(''):emptyCol}
          </div>
        </div>
        <div>
          <p class="col-head" style="color:#64748B"><i class="ti ti-tool" style="font-size:12px"></i>Sabel is handling <span style="font-size:10px;color:#475569;font-weight:400;margin-left:4px">${sDone}/${ws.sabel.length}</span></p>
          <div style="border-radius:10px;padding:2px;min-height:50px">
            ${visSabel.length?visSabel.map(o=>makeCard(o.t,o.cid,false,{c:o.c,l:o.l,noDrag:true})).join(''):emptyCol}
          </div>
        </div>
      </div>`;
  } else {
    const ph=P.find(p=>p.id===cur);
    const td=T[cur];
    const ps=phaseStats(cur);
    const phasePct=ps.total>0?Math.round(ps.done/ps.total*100):0;
    const visClient=td.client.filter(t=>taskVisible(t));
    const visSabel=td.sabel.filter(t=>taskVisible(t));
    const clientDone=td.client.filter(t=>t.s==='Complete').length;
    const sabelDone=td.sabel.filter(t=>t.s==='Complete').length;
    const emptyCol=`<div class="empty-col"><i class="ti ti-circle-check" style="font-size:22px;display:block;margin:0 auto 6px;color:#1E2433"></i>Nothing to show<br><span style="font-size:10px">Adjust filters above</span></div>`;
    html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
        <span style="width:9px;height:9px;border-radius:50%;background:${ph.c};display:inline-block;flex-shrink:0"></span>
        <span style="font-size:18px;font-weight:600;color:#E2E8F0">${ph.l}</span>
      </div>
      <div style="font-size:11px;color:#475569;margin-bottom:1.25rem">${ph.w} · ${ph.d}</div>
      <div class="phase-top">
        ${phaseCompletionCard(phasePct,ps.done,ps.total)}
        <div>${filterStatCards(ps.on,ps.att,ps.risk,true)}</div>
      </div>
      <div class="phase-cols">
        <div>
          <p class="col-head" style="color:#CA8A04"><i class="ti ti-alert-circle" style="font-size:12px"></i>Your actions <span style="font-size:10px;color:#475569;font-weight:400;margin-left:4px">${clientDone}/${td.client.length}</span></p>
          <div id="col-${cur}-c" ondragover="onDragOver(event,'col-${cur}-c')" ondragleave="onDragLeave(event,'col-${cur}-c')" ondrop="onDrop(event,'${cur}','client')" style="border-radius:10px;padding:2px;min-height:50px">
            ${visClient.length?visClient.map(t=>{const i=td.client.indexOf(t);return makeCard(t,cur+'-c-'+i,true);}).join(''):emptyCol}
            <button class="add-task-btn" onclick="openAddMenu(event,'${cur}','client')"><i class="ti ti-plus" style="font-size:13px"></i>Add client action</button>
          </div>
        </div>
        <div>
          <p class="col-head" style="color:#64748B"><i class="ti ti-tool" style="font-size:12px"></i>Sabel is handling <span style="font-size:10px;color:#475569;font-weight:400;margin-left:4px">${sabelDone}/${td.sabel.length}</span></p>
          <div id="col-${cur}-s" ondragover="onDragOver(event,'col-${cur}-s')" ondragleave="onDragLeave(event,'col-${cur}-s')" ondrop="onDrop(event,'${cur}','sabel')" style="border-radius:10px;padding:2px;min-height:50px">
            ${visSabel.length?visSabel.map(t=>{const i=td.sabel.indexOf(t);return makeCard(t,cur+'-s-'+i,false);}).join(''):emptyCol}
            <button class="add-task-btn" onclick="openAddMenu(event,'${cur}','sabel')"><i class="ti ti-plus" style="font-size:13px"></i>Add Sabel action</button>
          </div>
        </div>
      </div>`;
  }
  document.getElementById('main').innerHTML=html;
}

function render(){renderSidebar();renderMain();}
function setP(id){cur=id;activeFilters.clear();render();}
render();
loadInitial();
</script>
</body>
</html>
